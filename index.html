<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>定向地图图例库 - ISOM 2017-2 / ISSprOM 2019-2</title>
<style>
/* ===== Reset & Base ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#f0f5f3;color:#1a1a2e;min-height:100vh;transition:background .3s,color .3s}

/* ===== Dark Mode ===== */
@media (prefers-color-scheme:dark){
  body{background:#0d1117;color:#e6edf3}
  .header{background:rgba(22,27,34,.85)!important;border-color:rgba(240,246,240,.08)!important}
  .header h1{color:#e6edf3!important}
  .header .subtitle{color:#8b949e!important}
  .search-input{background:rgba(255,255,255,.06)!important;border-color:rgba(240,246,240,.12)!important;color:#e6edf3!important}
  .search-input::placeholder{color:#6e7681!important}
  .tab-bar{background:rgba(22,27,34,.7)!important;border-color:rgba(240,246,240,.08)!important}
  .tab{color:#8b949e!important}
  .tab:hover{background:rgba(45,106,79,.15)!important;color:#3fb950!important}
  .tab.active{background:rgba(45,106,79,.25)!important;color:#3fb950!important;border-color:#3fb950!important}
  .card{background:rgba(22,27,34,.7)!important;border-color:rgba(240,246,240,.06)!important}
  .card:hover{background:rgba(22,27,34,.9)!important;border-color:rgba(45,106,79,.3)!important}
  .card .code{color:#6e7681!important}
  .card .name{color:#e6edf3!important}
  .card .en-sub{color:#6e7681!important}
  .card .desc{color:#8b949e!important}
  .img-wrap{background:rgba(255,255,255,.04)!important;border-color:rgba(240,246,240,.06)!important}
  .group-header{color:#8b949e!important}
  .group-header:hover{color:#3fb950!important}
  .detail-nav{background:rgba(22,27,34,.85)!important;border-color:rgba(240,246,240,.08)!important}
  .detail-nav .back-btn{color:#e6edf3!important}
  .detail-nav .nav-count{color:#8b949e!important}
  .detail-nav .nav-arrow{color:#e6edf3!important}
  .detail-code{color:#3fb950!important}
  .detail-name{color:#e6edf3!important}
  .detail-img-wrap{background:rgba(255,255,255,.04)!important;border-color:rgba(240,246,240,.06)!important}
  .desc-card{background:rgba(22,27,34,.7)!important;border-color:rgba(240,246,240,.06)!important}
  .desc-card p{color:#c9d1d9!important}
  .bottom-nav .nav-btn{background:rgba(22,27,34,.7)!important;border-color:rgba(240,246,240,.1)!important;color:#e6edf3!important}
  .bottom-nav .nav-btn:hover{background:rgba(45,106,79,.25)!important;border-color:#3fb950!important}
  .empty-state{color:#6e7681!important}
  .toast{background:rgba(22,27,34,.95)!important;color:#e6edf3!important}
}
@media (prefers-color-scheme:dark){
  .desc-card p strong,.desc-card p b{color:#e6edf3!important}
}

/* ===== Header ===== */
.header{position:sticky;top:0;z-index:100;background:rgba(240,246,243,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(45,106,79,.1);padding:16px 16px 0;text-align:center}
.header h1{font-size:1.25rem;font-weight:700;color:#2D6A4F;letter-spacing:-.01em;margin-bottom:2px}
.header .subtitle{font-size:.75rem;color:#6b8a7a;margin-bottom:2px}

/* ===== Search ===== */
.search-wrap{padding:10px 16px 12px}
.search-input{width:100%;max-width:480px;margin:0 auto;display:block;padding:10px 16px 10px 40px;border:1.5px solid rgba(45,106,79,.15);border-radius:24px;font-size:.9rem;background:rgba(255,255,255,.6);color:#1a1a2e;outline:none;transition:all .2s;font-family:inherit}
.search-input:focus{border-color:#2D6A4F;box-shadow:0 0 0 3px rgba(45,106,79,.1);background:rgba(255,255,255,.9)}
.search-input::placeholder{color:#9bb5a8}
.search-icon{position:absolute;left:28px;top:50%;transform:translateY(-50%);color:#9bb5a8;pointer-events:none;width:18px;height:18px}
.search-wrap-inner{position:relative;max-width:480px;margin:0 auto}

/* ===== Tabs ===== */
.tab-bar{display:flex;gap:4px;padding:0 16px 12px;justify-content:center;flex-wrap:wrap}
.tab{padding:8px 18px;border-radius:20px;border:1.5px solid transparent;font-size:.82rem;cursor:pointer;transition:all .2s;background:transparent;color:#5a7a6a;font-family:inherit;white-space:nowrap;user-select:none}
.tab:hover{background:rgba(45,106,79,.08);color:#2D6A4F}
.tab.active{background:rgba(45,106,79,.12);color:#2D6A4F;border-color:rgba(45,106,79,.3);font-weight:600}
.tab .count{font-size:.7rem;opacity:.65;margin-left:4px}

/* ===== Card List ===== */
.list-wrap{padding:0 12px 80px;max-width:900px;margin:0 auto}
.group-header{padding:12px 8px 6px;font-size:.78rem;font-weight:600;color:#6b8a7a;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;transition:color .2s}
.group-header:hover{color:#2D6A4F}
.group-header::after{content:'';flex:1;height:1px;background:rgba(45,106,79,.12);border-radius:1px}
.group-header .chevron{width:16px;height:16px;transition:transform .2s;flex-shrink:0}
.group-header.collapsed .chevron{transform:rotate(-90deg)}
.group-items{overflow:hidden;transition:max-height .3s ease-out}
.group-items.collapsed{max-height:0!important}

/* ===== Card ===== */
.card{display:flex;width:100%;text-align:left;gap:12px;padding:12px;margin-bottom:8px;background:rgba(255,255,255,.6);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(45,106,79,.08);border-radius:16px;cursor:pointer;transition:all .2s;overflow:hidden;font-family:inherit}
.card:hover{transform:scale(1.01);background:rgba(255,255,255,.85);border-color:rgba(45,106,79,.2);box-shadow:0 4px 20px rgba(45,106,79,.08)}
.card:active{background:rgba(45,106,79,.1)}
.card:focus-visible,.tab:focus-visible,.back-btn:focus-visible,.nav-arrow:focus-visible,.nav-btn:focus-visible{outline:3px solid rgba(45,106,79,.35);outline-offset:2px}
.card .img-col{flex-shrink:0;width:72px}
.img-wrap{width:72px;height:56px;background:rgba(255,255,255,.8);border-radius:12px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(0,0,0,.06);overflow:hidden}
.img-wrap img{max-width:90%;max-height:90%;object-fit:contain;image-rendering:auto}
.card .text-col{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:2px}
.card .code{font-family:'SF Mono','Cascadia Code','Consolas',monospace;font-size:.75rem;color:#8a9e94;letter-spacing:.03em;line-height:1}
.card .name{font-size:.9rem;font-weight:600;color:#1a1a2e;line-height:1.3}
.card .en-sub{font-size:.72rem;color:#8a9e94;line-height:1.3;margin-top:1px}
.card .desc{font-size:.75rem;color:#6b7a72;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* ===== Empty ===== */
.empty-state{text-align:center;padding:60px 20px;color:#9bb5a8}
.empty-state .icon{width:54px;height:54px;margin:0 auto 12px;opacity:.45;color:currentColor}
.empty-state .text{font-size:.9rem}

/* ===== Detail Page ===== */
.detail-page{display:none;min-height:100vh;padding-bottom:100px}
.detail-page.show{display:block}

/* Detail Nav */
.detail-nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:rgba(240,246,243,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(45,106,79,.1)}
.detail-nav .back-btn{display:flex;align-items:center;gap:4px;padding:6px 10px;border:none;background:transparent;color:#2D6A4F;font-size:.85rem;cursor:pointer;border-radius:8px;transition:all .15s;font-family:inherit}
.detail-nav .back-btn:hover{background:rgba(45,106,79,.1)}
.detail-nav .back-btn svg{width:20px;height:20px}
.detail-nav .nav-arrows{display:flex;align-items:center;gap:2px}
.detail-nav .nav-arrow{padding:6px 8px;border:none;background:transparent;color:#2D6A4F;cursor:pointer;border-radius:8px;transition:all .15s;font-size:1.1rem;line-height:1}
.detail-nav .nav-arrow:hover{background:rgba(45,106,79,.1)}
.detail-nav .nav-arrow:active{transform:scale(.9)}
.detail-nav .nav-count{font-size:.78rem;color:#6b8a7a;min-width:56px;text-align:center;user-select:none}

/* Detail Content */
.detail-content{max-width:600px;margin:0 auto;padding:24px 16px;display:flex;flex-direction:column;align-items:center}
.detail-img-wrap{width:240px;height:200px;background:rgba(255,255,255,.8);border-radius:16px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(45,106,79,.1);margin-bottom:16px;overflow:hidden}
.detail-img-wrap img{max-width:95%;max-height:95%;object-fit:contain;image-rendering:auto}
.detail-code{font-family:'SF Mono','Cascadia Code','Consolas',monospace;font-size:1.1rem;color:#2D6A4F;margin-bottom:4px;letter-spacing:.04em}
.detail-name{font-size:1.35rem;font-weight:700;color:#1a1a2e;margin-bottom:4px;text-align:center}

/* Description Card */
.desc-card{width:100%;background:rgba(255,255,255,.55);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(45,106,79,.08);border-radius:16px;padding:20px;margin-bottom:24px}
.desc-card p{font-size:.9rem;line-height:1.75;color:#3a4a40;margin-bottom:12px}
.desc-card p:last-child{margin-bottom:0}
.desc-card p strong,.desc-card p b{color:#1a1a2e}

/* Bottom Nav */
.bottom-nav{display:flex;align-items:center;justify-content:center;gap:16px;padding:0 16px}
.bottom-nav .nav-btn{display:flex;align-items:center;gap:8px;padding:12px 18px;border:1.5px solid rgba(45,106,79,.15);border-radius:14px;background:rgba(255,255,255,.55);color:#2D6A4F;cursor:pointer;transition:all .2s;font-family:inherit;font-size:.85rem;user-select:none}
.bottom-nav .nav-btn:hover{background:rgba(45,106,79,.1);border-color:#2D6A4F}
.bottom-nav .nav-btn:active{transform:scale(.95)}
.bottom-nav .nav-btn .label{font-size:.75rem;opacity:.6}
.bottom-nav .nav-btn .val{font-weight:600;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bottom-nav .spacer{flex:1;max-width:20px}

/* ===== List Page ===== */
.list-page{display:block;min-height:100vh;padding-bottom:80px}
.list-page.hide{display:none}

/* ===== Toast ===== */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(26,26,46,.9);color:#fff;padding:10px 20px;border-radius:20px;font-size:.82rem;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.toast.show{opacity:1}

/* ===== Responsive ===== */
@media (max-width:640px){
  .header h1{font-size:1.1rem}
  .tab-bar{flex-wrap:nowrap;justify-content:flex-start;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-left:8px;padding-right:8px;gap:6px}
  .tab-bar::-webkit-scrollbar{display:none}
  .tab{font-size:.75rem;padding:6px 14px;flex-shrink:0;white-space:nowrap}
  .card{padding:10px;gap:10px}
  .card .img-col{width:60px}
  .img-wrap{width:60px;height:48px;border-radius:10px}
  .card .name{font-size:.82rem}
  .card .desc{font-size:.72rem}
  .detail-img-wrap{width:180px;height:150px}
  .detail-name{font-size:1.15rem}
  .bottom-nav .nav-btn{padding:10px 14px;font-size:.8rem}
  .list-wrap{padding:0 8px 80px}
}
@media (max-width:380px){
  .card .img-col{width:52px}
  .img-wrap{width:52px;height:42px;border-radius:8px}
  .card{gap:8px;padding:8px}
}

/* ===== Safe Area & New Components ===== */
/* Safe area bottom padding */
.list-wrap,.list-page{padding-bottom:calc(80px + env(safe-area-inset-bottom,0px))}
.detail-page{padding-bottom:calc(100px + env(safe-area-inset-bottom,0px))}
.toast{bottom:calc(24px + env(safe-area-inset-bottom,0px))}

/* Search Clear Button */
.search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,.08);border:none;cursor:pointer;display:none;align-items:center;justify-content:center;color:#6b8a7a;font-size:.85rem;line-height:1;padding:0;transition:background .15s}
.search-clear.show{display:flex}
.search-clear:active{background:rgba(0,0,0,.18)}

/* Detail Swipe Transition */
.detail-content{transition:transform .2s ease-out}
.detail-content.swiping{transition:none}

/* Image Fullscreen Overlay */
.img-overlay{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;-webkit-tap-highlight-color:transparent;flex-direction:column}
.img-overlay.show{opacity:1;pointer-events:auto}
.img-overlay img{width:480px;height:400px;max-width:95vw;max-height:85vh;object-fit:contain;border-radius:4px}
.img-overlay .overlay-close{position:fixed;top:max(16px,env(safe-area-inset-top,0px));right:max(16px,env(safe-area-inset-right,0px));width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:1.5rem;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;z-index:201}
.img-overlay .overlay-hint{color:rgba(255,255,255,.45);font-size:.75rem;margin-top:12px;text-align:center;user-select:none}

/* Scroll-to-Top Button */
.scroll-top-btn{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom,0px));right:max(16px,env(safe-area-inset-right,0px));width:44px;height:44px;border-radius:50%;background:rgba(45,106,79,.88);border:none;color:#fff;cursor:pointer;z-index:90;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,.18);opacity:0;transform:translateY(20px);transition:opacity .3s,transform .3s;pointer-events:none;-webkit-tap-highlight-color:transparent}
.scroll-top-btn.show{opacity:1;transform:translateY(0);pointer-events:auto}
.scroll-top-btn:active{transform:scale(.88)!important}
.scroll-top-btn svg{width:22px;height:22px}

/* Detail image click hint */
.detail-img-wrap{cursor:pointer}
.detail-img-wrap:active{opacity:.8}

/* Dark mode additions for new components */
@media (prefers-color-scheme:dark){
  .search-clear{background:rgba(255,255,255,.12);color:#8b949e}
  .search-clear:active{background:rgba(255,255,255,.2)}
  .scroll-top-btn{background:rgba(63,185,80,.65)}
  .card:active{background:rgba(45,106,79,.3)!important}
  .img-overlay{background:rgba(0,0,0,.95)}
}
</style>
</head>
<body>

<!-- ===== HEADER ===== -->
<div class="header">
  <h1>🗺️ 定向地图图例库</h1>
  <div class="subtitle">Orienteering Map Legend Reference</div>
  <div class="search-wrap">
    <div class="search-wrap-inner">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" class="search-input" id="searchInput" placeholder="搜索编号或名称..." autocomplete="off">
      <button class="search-clear" id="searchClear" aria-label="清除搜索" title="清除">✕</button>
    </div>
  </div>
  <div class="tab-bar" id="tabBar">
    <button class="tab active" data-std="all">全部<span class="count" id="countAll"></span></button>
    <button class="tab" data-std="isom2017">ISOM 2017-2<span class="count" id="countISOM"></span></button>
    <button class="tab" data-std="issprom2019">ISSprOM 2019-2<span class="count" id="countISS"></span></button>
    <button class="tab" data-std="iscd2018">ISCD 2018<span class="count" id="countISCD"></span></button>
  </div>
</div>

<!-- ===== LIST PAGE ===== -->
<div class="list-page" id="listPage">
  <div class="list-wrap" id="listWrap"></div>
  <div class="empty-state" id="emptyState" style="display:none">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m20 20-4-4"/></svg>
    <div class="text">没有找到匹配的图例</div>
  </div>
</div>

<!-- ===== DETAIL PAGE ===== -->
<div class="detail-page" id="detailPage">
  <div class="detail-nav">
    <button class="back-btn" id="backBtn" title="返回列表">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      返回
    </button>
    <div class="nav-arrows">
      <button class="nav-arrow" id="prevBtn" title="上一个">◀</button>
      <span class="nav-count" id="navCount"></span>
      <button class="nav-arrow" id="nextBtn" title="下一个">▶</button>
    </div>
  </div>
  <div class="detail-content">
    <div class="detail-img-wrap">
      <img id="detailImg" src="" alt="">
    </div>
    <div class="detail-code" id="detailCode"></div>
    <div class="detail-name" id="detailName"></div>
    <div class="desc-card" id="descCard"></div>
    <div class="bottom-nav">
      <button class="nav-btn" id="bottomPrev">
        <span style="font-size:1.1rem">◀</span>
        <div><div class="label">上一个</div><div class="val" id="prevLabel"></div></div>
      </button>
      <button class="nav-btn" id="bottomNext">
        <div style="text-align:right"><div class="label">下一个</div><div class="val" id="nextLabel"></div></div>
        <span style="font-size:1.1rem">▶</span>
      </button>
    </div>
  </div>
</div>

<!-- Image Fullscreen Overlay -->
<div class="img-overlay" id="imgOverlay">
  <button class="overlay-close" id="overlayClose" aria-label="关闭">✕</button>
  <img id="overlayImg" src="" alt="">
  <div class="overlay-hint">点击任意位置关闭</div>
</div>

<!-- Scroll to Top -->
<button class="scroll-top-btn" id="scrollTopBtn" aria-label="回到顶部" title="回到顶部">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>
</button>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ===== DATA =====
const ISOM_DATA = [{"code":"101","name":"首曲线（基本等高线）","name_en":"Contour","description":"首曲线是地面上高程相等的各相邻点所连成的闭合曲线。标 准等高距为5 m。对于平坦地貌，可使用2.5 m的等高距。 示坡线绘制在首曲线较低的一侧用来指示下坡方向，使用时 将示坡线放置在山凹处。 可用闭合的首曲线绘制小丘或凹地。用首曲线绘制凹地时至 少要绘制一条示坡线。用首曲线绘制的小丘最小高度或凹地的最 小深度应为1 m。 相邻首曲线之间的关系非常重要。相邻的首曲线可表示出地 貌的形状和结构。首曲线上应该避免出现小细节，以防止其遮盖 地貌的主要特征。 突出的地貌特征，如凹地，山凹，山凸，土崖和台地可能会 被夸大绘制。 绝对高程并不那么重要，但相邻特征之间的相对高度应在地 图上尽可能准确地绘制出来。为更突出地貌特征，允许稍微改变0.14 0.140.4min = 最小尺寸 14首曲线位置，但变化不应超过等高距的25%，且必须注意相邻特 征物的位置。 首曲线最小弯曲处外端顶线中心到主线所处线中心的距离为 。山凹口或山凸两侧等高线中心到中心 间距最少0.5 mm（符号占地8m）。 首曲线绘制的小丘最小长度为0.9 mm（符号占地13.5 m）， 最小宽度为0.6 mm（符号占地9 m）。较小的突出小丘可以用符 号“圆形土堆（109）”或“狭长土堆（110）”绘制，也可以夸 大绘制以满足符号最小尺寸规定","icon":"images/isom2017img/101-Contour.svg","standard":"isom2017"},{"code":"102","name":"计曲线（加粗等高线）","name_en":"Index contour","description":"为快速判读高度差和地貌的整体起伏，每隔四条首曲线必须 绘制一条较粗的计曲线。在细节较多的区域可以用首曲线代替。 用等高线绘制小丘或凹地时通常不使用计曲线绘制。 在平坦地貌中必须仔细选择计曲线的位置。最理想的是选取 最能凸显斜坡的重要等高线作为计曲线。计曲线可以绘制等高线 注记。等高线注记只能放置在计曲线不遮挡细节的位置。等高线 注记顶部方向必须朝向等高线的较高侧。等高线注记（文本）高 必须为1.5 mm，字体使用无衬线字体","icon":"images/isom2017img/102-Index-contour.svg","standard":"isom2017"},{"code":"103","name":"间曲线（半距等高线）","name_en":"Form line","description":"若需提供更多有关地面起伏的信息，则使用间曲线绘制。只 有在首曲线不能完整描述地貌的情况下才会使用间曲线。间曲 线不得用在两等高线的中间插值线位置。相邻等高线之间只能使 用一条间曲线。间曲线和等高线体系逻辑上吻合非常重要，因此 间曲线的起止处应与相邻等高线平行。间曲线虚线的间断处必须 放在合理的直线部分上。间曲线可用于区分土丘或凹地（最小高 度/深度应为1 m）是否扁平或明显。必须避免过度使用间曲线， 因为这会干扰地貌的三维图像，并使地图阅读复杂化。 最小长度（非闭合）：两段线划。 最小尺寸绘制的小丘和凹地：外部尺寸为1.1 mm（符号占地 ）","icon":"images/isom2017img/103-Form-line.svg","standard":"isom2017"},{"code":"104","name":"土崖","name_en":"Earth bank","description":"土崖（土坎）是指可与周围环境明显区分出来的地面高度骤 变的地貌，例如（砾石坑或沙坑、公路或铁路的路堑或路堤）。 最小高度：1 m。土崖可能会影响奔跑速度。齿线的长度表 示整个土崖坡面的水平延伸范围。 对于长土崖，末端允许使用短于最小长度的齿线。如果两个 土崖紧邻，则可以省略齿线。难以翻越的土崖必须使用“难以翻 越的石崖（201）”绘制。 最小长度：0.6 mm（符号占地9 m）","icon":"images/isom2017img/104-Earth-bank.svg","standard":"isom2017"},{"code":"105","name":"土垄","name_en":"Earth wall","description":"明显的土垄。最小高度：1 m。 最小长度：1.4 mm（符号占地21 m)","icon":"images/isom2017img/105-Earth-wall.svg","standard":"isom2017"},{"code":"106","name":"残破的土垄","name_en":"Ruined earth wall","description":"残破的或不明显的土垄。最小高度：0.5 m。 最小长度：两段线划(3.65 mm-符号占地55 m)。如果更短,则 符号必须被夸大到最小长度或改用符号“土垄(105)”绘制","icon":"images/isom2017img/106-Ruined-earth-wall.svg","standard":"isom2017"},{"code":"107","name":"冲沟","name_en":"Erosion gully","description":"用单线绘制因太小而无法用“土崖（104）”绘制的冲沟。 最小深度：1 m。 最小长度：1.15 mm（符号占地17 m）。不应剪开冲沟周围的 等高线","icon":"images/isom2017img/107-Erosion-gully.svg","standard":"isom2017"},{"code":"108","name":"小冲沟","name_en":"Small erosion gully","description":"小冲沟，小干沟或小壕沟。最小深度：0.5 m。 最小长度（独立使用时）：2个点（0.7 mm-符号占地 ）。建议剪开小冲沟周围的等高线以提高易读性","icon":"images/isom2017img/108-Small-erosion-gully.svg","standard":"isom2017"},{"code":"109","name":"圆形土堆","name_en":"Small knoll","description":"无法用等高线依比例绘制的明显的圆形土堆、小丘或石质突 起。最小高度：1 m。 本符号禁止接触或重叠等高线。 符号占地：7.5 m×7.5 m","icon":"images/isom2017img/109-Small-knoll.svg","standard":"isom2017"},{"code":"110","name":"狭长土堆","name_en":"Small elongated knoll","description":"无法用等高线依比例绘制的明显狭长的土堆、小丘或石质突 起，符号长轴方向同实地土堆长轴朝向。 最小高度：1 m。 本符号禁止接触或重叠等高线。 符号占地：12 m×6 m","icon":"images/isom2017img/110-Small-elongated-knoll.svg","standard":"isom2017"},{"code":"111","name":"小凹地","name_en":"Small depression","description":"太小而无法用等高线绘制的没有陡边的小凹地或凹陷。最小 深度：1 m，最小宽度：2 m。 有陡峭边缘的小凹地或凹陷用“土坑（112）”绘制。 该符号不得接触或重叠其他棕色符号。符号的重心是实地精 确位置，符号方向朝北。 符号占地：12 m×6 m","icon":"images/isom2017img/111-Small-depression.svg","standard":"isom2017"},{"code":"112","name":"土坑","name_en":"Pit","description":"无法用符号“土崖(104)”依比例绘制的具有明显陡峭边缘 的土坑或土洞,最小深度：1 m，最小宽度：1 m。 大于5 m×5 m的坑通常应该被夸大使用“土崖(104)”绘制。 没有陡边的坑均用“小凹地(111)”绘制。 该符号不得接触或重叠其他棕色符号。符号的重心是实地精 确位置，符号方向朝北。 符号占地：10.5 m×12 m","icon":"images/isom2017img/112-Pit.svg","standard":"isom2017"},{"code":"113","name":"坑洼地面","name_en":"Broken ground","description":"凹坑和/或土堆太复杂而无法详细绘制的地面，或其他类型 的坑洼或不平坦的地面，对通行性影响不大但可以清楚地与其他 地面区分。 点的位置应随机绘制，但不得干扰重要的地貌特征和地物。 最少应绘制3个点（占地10 m×10 m）。 相邻点之间的中心最大间距为0.6 mm。 相邻点之间的中心最小间距为0.5 mm。 不应剪开坑洼地面上的等高线。 不得排列成单点线的式样。 密度：3-4个点/mm²","icon":"images/isom2017img/113-Broken-ground.svg","standard":"isom2017"},{"code":"114","name":"非常坑洼的地面","name_en":"Very broken ground","description":"坑和/或丘太复杂而无法详细绘制的地面，或者其他类型的 坑洼或不平整的地面，可以清楚地与其他地面区分且影响通行 性。 点应该是随机分布,但不应干扰重要的地貌特征和符号。最 少应绘制3个点(符号占地7 m×7 m)。 相邻两点的中心最大间距为0.38 mm。 相邻两点的中心最小间距为0.25 mm。 不应被剪开在非常破碎的地面处的等高线。 不得排列成单点线的式样。 密度：7-9个点/mm²","icon":"images/isom2017img/114-Very-broken-ground.svg","standard":"isom2017"},{"code":"115","name":"突出的特殊地貌","name_en":"Prominent landform feature","description":"该符号所绘制的特征必须与周围环境非常清晰地区分开来。 符号的重心是实地精确位置，符号方向朝北。 该符号不得与其他棕色符号接触或重叠。 必须在地图上给出符号定义。 符号占地：13.5 m×11.5 m 0.9 0.9 0.9 3.2 岩壁和石块3.2 岩壁和石块 岩壁是一种特殊的地形特征。岩壁除了可以帮助运动员读图和提供寻找检查点的特征 外，还包含了这种地形的危险性和通行性等有用信息。岩壁用黑色来绘制，以区别于其它 类型的地形特征。必须注意确保石崖等岩壁特征与等高线所示的地貌的下坡方向的一致 性","icon":"images/isom2017img/115-Prominent-landform-feature.svg","standard":"isom2017"},{"code":"201","name":"难以翻越的石崖","name_en":"Impassable cliff","description":"难以翻越、攀爬或有危险的石崖、采石场或非常高且陡峭的 难以翻越土崖。 对于垂直的岩壁，如果图上位置不足，则可以省略石崖的齿 线。基线的末端可以是圆形也可以是平的。两端可使用较短的齿 线。 两个难以翻越的石崖之间或难以翻越的石崖与其他难以翻越 的重要符号之间的距离在地图上必须超过0.25 mm。 当难以翻越的石崖垂直落入水中，运动员无法沿着石崖的下 边缘穿越时，可以忽略水岸线，或者齿线必须清晰地延伸到水岸 线上。难以翻越的石崖下坡方向应与等高线下坡方向相对应。 最小长度：0.6 mm(符号占地9 m)。 颜色：黑色","icon":"images/isom2017img/201-Impassable-cliff.svg","standard":"isom2017"},{"code":"202","name":"可翻越的石崖","name_en":"Cliff","description":"可翻越的石崖（岩壁）或采石场。如果从等高线上不能明显 看出石崖的下坡方向，或为了提高易读性，应在下坡方向绘制短 的齿线。 对于非垂直的石崖，齿线长度表示石崖坡面的水平延伸范 围。如果不绘制齿线，基线的两端必须是圆的。两石崖之间的通 道最小间距为0.15 mm。石崖下坡方向应该与等高线下坡方向相 对应。 翻越石崖一般会降低奔跑速度。 最小高度：1 m。 最小长度：0.6 mm(符号占地9 m)","icon":"images/isom2017img/202-Cliff.svg","standard":"isom2017"},{"code":"203","name":"岩坑或山洞","name_en":"Rocky pit or cave","description":"可能对运动员构成危险的岩坑、土坑、山洞或矿井。 符号的重心是实地精确位置，除具有明显入口的山洞除外， 符号方向必须朝北，绘制山洞时该符号方向应指向洞口外。 直径大于5 m的岩坑应使用符号“石崖(201、202)”夸大绘 制。 最小深度：1 m。 符号占地：10.5 m×12 m","icon":"images/isom2017img/203-Rocky-pit-or-cave.svg","standard":"isom2017"},{"code":"204","name":"石块","name_en":"Boulder","description":"可以在地面上快速辨识出的突出石块（高度大于1 m）。成 群的石块使用符号“石群（207）”或“石块地（208、209）” 绘制。 为了能够突出相邻（距离30 m内）石块在大小上有明显差 异，允许将某些石块的符号直径放大至0.5 mm。 符号占地：直径6 m（放大后直径7.5 m）","icon":"images/isom2017img/204-Boulder.svg","standard":"isom2017"},{"code":"205","name":"大石块","name_en":"Large boulder","description":"特别大而明显的石块。大石块高应超过2 m。为了能够突出 相邻（距离30 m内）石块在大小上有明显差异，允许将某些大石 块的符号缩小至0.5 mm。 符号占地：直径9m（缩小后直径7.5 m）。 颜色：黑色。min. 0.65 0.12 0.50.4 0.25 0.160.7 (ø 0.5)最大. 2.0 (ø 0.5)最大. 2.0","icon":"images/isom2017img/205-Large-boulder.svg","standard":"isom2017"},{"code":"206","name":"巨石或岩柱","name_en":"Gigantic boulder or rock pillar","description":"必须按平面轮廓形状绘制超大的石块、岩柱或巨大的岩壁。 实地中特征物的形状和尺寸可能和插图不同。 在地图上，巨石之间或巨石与其他难以翻越的特征符号之间 的间距必须超过0.15mm。 最小宽度：0.25 mm（符号占地3.75 m）。 最小面积：0.3 mm²（符号占地67 m²）","icon":"images/isom2017img/206-Gigantic-boulder-or-rock-pillar.svg","standard":"isom2017"},{"code":"207","name":"石群","name_en":"Boulder cluster","description":"众多堆积在一起无法单独绘制的石头。石群中的石块应高于 。石群必须为一组易于识别的石块群。 为了能够显示相邻（距离30 m内）石群之间大小的显著差 异，允许将该符号放大至120%（边缘长度0.96 mm）。 符号方向朝北。 符号占地：12 m×10 m","icon":"images/isom2017img/207-Boulder-cluster.svg","standard":"isom2017"},{"code":"208","name":"石块地","name_en":"Boulder field","description":"随机分布着众多无法单独绘制的石块的区域，绘制为随 机放置和随机朝向的实心三角形，边长比为8:6:5（内部角 度：92.9°、48.5°、38.6°）。石块地通常不会影响通行性。 如果石块地的通行性受到影响，则应使用符号”密集的石块地 (209）”绘制，或者将它与碎石地符号叠加使用。 至少应绘制两个三角形。如果一个三角形与其他岩石符号叠 加在一起（例如，符号在“石崖（201、202）”下侧，与“石块 （204-206）”相邻或与“碎石地（210-212）”叠加），则可以 使用一个三角形。 相邻三角形之间的中心最大间距为1.2 mm。相邻三角形之间 的中心最小间距为0.75 mm。 密度：0.8-1个符号/mm²。为了能够显示在石块地内高度差 异明显的区域，可以将部分三角形放大至120％。 单个三角形的占地尺寸：12 m×6 m。 (0.96)最大. 2.00.80.8","icon":"images/isom2017img/208-Boulder-field.svg","standard":"isom2017"},{"code":"209","name":"密集石块地","name_en":"Dense boulder field","description":"随机分布着众多无法单独绘制的石块的区域，并且影响了 通行性。绘制为随机放置和随机朝向的实心三角形，边长为8：6 ：5（内部角度：92.9°、48.5°、38.6°）。最小符号尺寸至 少绘制两个三角形。 相邻三角形之间的中心最大间距为0.6 mm。 密度：2-3个符号/mm²。为了能够在石块地中突出具有明显 高度差的区域，可以将部分三角形放大至120％。 单个三角形的占地尺寸：12 m×6 m","icon":"images/isom2017img/209-Dense-boulder-field.svg","standard":"isom2017"},{"code":"210","name":"慢跑碎石地","name_en":"Stony ground slow running","description":"分布着碎石或小石块的地面，通行性受影响降低至正常速 度的60％-80％。 图中点应随机分布，但不应干扰重要地貌特征和地物的绘 制。插图密度仅供参考，点符号（单点）也可以用来绘制碎石 地。 最少应绘制3个点(符号占地10 m×10 m)。邻近点之间的中心 最大间距为0.6 mm。 相邻点之间的中心最小间距为0.45 mm。 密度：3-4个点/mm²。 为避免与符号“明显的植被界线（416）”混淆,不得排列成 单点线的式样","icon":"images/isom2017img/210-Stony-ground-slow-running.svg","standard":"isom2017"},{"code":"211","name":"慢行碎石地","name_en":"Stony ground walk","description":"分布着碎石或小石块的地面，严重影响了通行性（降至正常 速度的20-60％）。 图中点应随机分布，但不应干扰重要地貌特征和地物的绘 制。插图密度仅供参考，也可用点状符号来绘制碎石地。 最少应绘制3个点(符号占地寸8 m×8 m)。相邻点之间的中心 最大间距为0.4 mm。 相邻点之间的中心最小间距为0.32 mm。 密度：6-8个点/mm²。 为避免与符号“明显植被界线（416）”混淆,不得排列成单 点线的式样","icon":"images/isom2017img/211-Stony-ground-walk.svg","standard":"isom2017"},{"code":"212","name":"难行碎石地","name_en":"Stony ground fight","description":"分布着碎石或小石块的难通行(低于正常速度的20%)地面。 地图中点应随机分布，但不应干扰重要地貌特征和地物的绘 制。插图密度仅供参考，也可以用点状符号来绘制碎石地。 最少应绘制3个点(符号占地7 m×7 m)。相邻点之间的中心 最大间距为0.32 mm。相邻点之间的中心最小间距为0.25 mm。密 度：10-12个点/mm²。 为避免与符号“明显的植被界线（416）”混淆,不得排列成 单点线的式样","icon":"images/isom2017img/212-Stony-ground-fight.svg","standard":"isom2017"},{"code":"213","name":"空旷的沙地","name_en":"Open sandy ground","description":"具有软沙的空旷地面，其通行性降低至正常奔跑速度的80% 以下。符号方向朝北。 最小面积：1 mm×1 mm(符号占地15 m×15 m)","icon":"images/isom2017img/213-Open-sandy-ground.svg","standard":"isom2017"},{"code":"214","name":"裸岩地","name_en":"Bare rock","description":"没有泥土或植被覆盖的可通行的岩面区域应绘制为裸岩地。 覆盖有草、苔藓或其他低矮植被的岩石区域不得使用裸岩地 符号绘制。 通行性降低的裸岩区域应使用符号“碎石地（210-212）” 绘制。 最小面积：1 mm×1 mm(符号占地15 m×15 m)","icon":"images/isom2017img/214-Bare-rock.svg","standard":"isom2017"},{"code":"215","name":"壕沟","name_en":"Trench","description":"天然或人工的壕沟（堑壕）。例如：战壕。 最小深度应为1 m。 最小长度：1 mm(符号占地15 m)。 较短的壕沟可夸大至最小尺寸绘制。难以翻越的壕沟必须使 用符号“难以翻越的石崖（201）”绘制。 侧壁坍塌或易于翻越的壕沟应绘制成冲沟。 0.45(CC)ø 0.16 223.3 水体和沼泽3.3 水体和沼泽 本节既包括开阔的水体，也包括由于水（沼泽）的存在而形成的特殊类型的植被。水 系分类很重要，因为它表示了通行性，并为读图和寻找检查点提供了参考特征。水域的轮 廓线绘制为黑色粗线时表示它难以穿越（徒涉）。本节中列出的符号可能仅在某些季节有 水。沼泽符号可与表示通视性（黄色）和通行性（绿色和黄色）的面状符号叠加使用","icon":"images/isom2017img/215-Trench.svg","standard":"isom2017"},{"code":"301","name":"难以穿越的水域","name_en":"Uncrossable body of water","description":"黑色的轮廓线强调该水域是难以穿越的。 大面积的水域可以使用70%蓝色绘制，小面积的水域和狭窄 部分必须始终用100%蓝色绘制。 最小宽度(内部)：0.3 mm。 最小面积(内部)：0.55 mm×0.55 mm(符号占地8 m×8 m)","icon":"images/isom2017img/301-Uncrossable-body-of-water.svg","standard":"isom2017"},{"code":"302","name":"可穿越的浅水域","name_en":"Shallow body of water","description":"季节性或周期性的浅水域可以用带虚线轮廓的符号绘制。较 小的可穿越的浅水域可以用100％蓝色绘制（无轮廓）。 最小宽度(内侧尺寸)：0.3 mm。 最小面积( 内侧尺寸):0.7mm×0.7mm( 符号占地10.5m×10.5m )。 最小宽度(100%蓝色)：0.3 mm。 最小面积(100%蓝色)：0.55mm×0.55mm(符号占地8m×8m)","icon":"images/isom2017img/302-Shallow-body-of-water.svg","standard":"isom2017"},{"code":"303","name":"水坑","name_en":"Waterhole","description":"积满水的水坑或因面积太小而无法依比例绘制的水域。 符号的重心是实地精确位置，符号方向朝北。 符号占地：10.5 m×12 m","icon":"images/isom2017img/303-Waterhole.svg","standard":"isom2017"},{"code":"304","name":"可穿越的水道","name_en":"Crossable watercourse","description":"宽度至少2 m。 最小长度(独立使用时)：1 mm(符号占地15 m)","icon":"images/isom2017img/304-Crossable-watercourse.svg","standard":"isom2017"},{"code":"305","name":"可穿越的小水道","name_en":"Small crossable watercourse","description":"最小长度(独立使用时)：1 mm(符号占地15 m)","icon":"images/isom2017img/305-Small-crossable-watercourse.svg","standard":"isom2017"},{"code":"306","name":"次要/季节性水渠","name_en":"Minor seasonal waterchannel","description":"可能季节性有水的天然或人造的次要水渠。 最小长度( 独立使用时 )：两段线划(2.75 mm-符号占地41 m)","icon":"images/isom2017img/306-Minor-seasonal-waterchannel.svg","standard":"isom2017"},{"code":"307","name":"难以穿越的沼泽","name_en":"Uncrossable marsh","description":"难以穿越或对运动员可能存在危险的沼泽。黑色轮廓强调该 符号是难以穿越的。本符号与“难以穿越的水域（301）”符号 之间的黑色边线可省略。本符号可以与“凌乱空旷地（403、404 ）”符号叠加以表示通视性。至少绘制两条清晰可见的蓝色线 划。 符号方向朝北。 最小宽度：两条线划或0.8 mm(内侧尺寸)。 较小的区域必须被忽略、放大或使用符号“不可穿越的水域 （301）”绘制","icon":"images/isom2017img/307-Uncrossable-marsh.svg","standard":"isom2017"},{"code":"308","name":"可穿越的沼泽","name_en":"Marsh","description":"可穿越的有明显边界的沼泽。 该符号必须与其他符号叠加使用,以显示通行性和通视性。 符号方向朝北。 最小面积：0.5 mm×0.4 mm(符号占地7.5 m × )","icon":"images/isom2017img/308-Marsh.svg","standard":"isom2017"},{"code":"309","name":"狭窄的沼泽","name_en":"Narrow marsh","description":"因太狭窄(宽度小于5 m)而不能用“可穿越的沼泽（308）” 符号绘制的沼泽或涓涓细流。 最小长度(独立使用时)：两个点(0.7 mm-符号占地10.5 m)","icon":"images/isom2017img/309-Narrow-marsh.svg","standard":"isom2017"},{"code":"310","name":"不明显的沼泽","name_en":"Indistinct marsh","description":"可穿越的不明显的季节性沼泽或从沼泽到坚实地面的过渡区 域。通常边界不明显，植被与周围区域相似。 该符号必须与其他符号叠加以显示通行性和通视性。符号方 向朝北。 最小面积：2.0 mm×0.7 mm（符号占地30 m×10.5 m）","icon":"images/isom2017img/310-Indistinct-marsh.svg","standard":"isom2017"},{"code":"311","name":"井、喷泉或蓄水池","name_en":"Small fountain or well","description":"突出的水井、喷泉、蓄水池或围起的泉源。 符号占地：12 m×12 m。 颜色：蓝色","icon":"images/isom2017img/311-Small-fountain-or-well.svg","standard":"isom2017"},{"code":"312","name":"泉源","name_en":"Spring","description":"水的源头。 符号的重心是实地精确位置，符号的方向朝向下游。 符号占地：13.5 m×7 m","icon":"images/isom2017img/312-Spring.svg","standard":"isom2017"},{"code":"313","name":"突出的特殊水体","name_en":"Prominent water feature","description":"符号方向朝北。必须在地图上给出符号定义。","icon":"images/isom2017img/313-Prominent-water-feature.svg","standard":"isom2017"},{"code":"401","name":"空旷地","name_en":"Open land","description":"具有地面覆盖物（草，苔藓或类似植物）的空旷地，比典型 的“好跑树林（405）”具有更好的通行性。如果地图中黄色区 域占主导颜色比例时，则可以使用75％黄色代替100%黄色。 除“坑洼地面（113）”，“石块地（208）”，“可穿越的 沼泽（308）”和“不明显的沼泽（310）”以外，不得与其他面 状符号叠加使用。 最小面积：0.55 mm×0.55 mm（符号占地8 m×8 m）","icon":"images/isom2017img/401-Open-land.svg","standard":"isom2017"},{"code":"402","name":"稀树空旷地","name_en":"Open land with scattered trees","description":"在黄色面状符号上排列规则的点状孔用以表示在空旷地上零 散分布着零星树木或灌木丛的区域。这些点可以是白色（零散分 布的乔木）或绿色（零散分布的灌木/灌木丛）。也可以使用符 号“突出的大树（417）”来绘制特别突出的树。如果黄色区域 占主导颜色比例时，则可以使用75％黄色代替100%黄色。 最小宽度：1.5 mm（符号占地22.5 m）。 最小面积：2 mm×2 mm（符号占30 m×30 m）。 更小的区域必须省略、夸大或用“空旷地（401）”绘制。 符号方向朝北。 颜色：黄色（或75％黄色），带有白色或60％绿色的孔。100%","icon":"images/isom2017img/402-Open-land-with-scattered-trees.svg","standard":"isom2017"},{"code":"403","name":"凌乱空旷地","name_en":"Rough open land","description":"具有与典型好跑树林相同通行性的荒地、高沼地、砍伐地、 新种植树木区（树木约低于1 m）或其他具有凌乱地表植被如： 具有帚石楠地或高草地的空旷地。 可与以下植被符号相叠加：“通视性好的慢跑矮植被（407 ）”或“通视性好的慢行矮植被（409）”以表示通行性降低。 最小面积：1 mm×1 mm(符号占地15 m×15 m)。 更小的区域必须省略、夸大或使用“空旷地（401）”绘 制","icon":"images/isom2017img/403-Rough-open-land.svg","standard":"isom2017"},{"code":"404","name":"凌乱稀树空旷地","name_en":"Rough open land with scattered trees","description":"在黄色面状符号上排列规则的点状图案用以表示在空地上零 散分布着树木或灌木丛的区域。 点可以是白色的（零散分布的乔木）或绿色的（零散分布的 灌木/灌木丛）。只有使用带白色点的符号形式时可以与以下植 被符号叠加使用以表示通行性降低：“通视性好的慢跑矮植被 （407）”或“通视性好的慢行矮植被（409）”。 符号方向朝北。 最小宽度：1.5 mm(符号占地22.5 m)。 最小面积：2.5 mm×2.5 mm(符号占地37.5 m×37.5 m)。 更小的区域必须省略、夸大或使用“凌乱空旷地（403）” 绘制","icon":"images/isom2017img/404-Rough-open-land-with-scattered-trees.svg","standard":"isom2017"},{"code":"405","name":"好跑树林","name_en":"Forest","description":"典型的好跑树林。如果没有可以轻松通行的树林区域，则地 图上不应出现白色。 最小面积：位于其他颜色区域中的孔1 mm×1 mm（符号 占地15 m×15 m）；但以下植被符号除外：“慢行植被（408 ）”中最小面积为0.7 mm×0.7 mm（符号占地10.5 m×10.5 m） 。“空旷地（401）”中最小面积为0.7 mm×0.7 mm（符号占 地10.5 m×10.5 m）。“难行植被”（410）中最小面积为 ×0.55 mm（符号占地8 m×8 m）","icon":"images/isom2017img/405-Forest.svg","standard":"isom2017"},{"code":"406","name":"慢跑植被","name_en":"Vegetation slow running","description":"植被茂密（通视性较差）的区域，通行速度降低至正常速度 的60-80％。 在某方向上具有更好通行性时，应在30%绿色面状符号上叠 加规则的白色条纹，以表示好跑的方向。 最小面积：1 mm×1 mm（符号占地15 m×15 m）。 最小宽度：0.4 mm（符号占地6 m）","icon":"images/isom2017img/406-Vegetation-slow-running.svg","standard":"isom2017"},{"code":"407","name":"通视性好的慢跑矮植被","name_en":"Vegetation slow running good visibility","description":"通视性好但通行性降低至慢跑的下层矮植被，植被类型通常 为矮灌木(荆棘、帚石楠、矮灌木丛、修剪后的树枝等)。奔跑速 度降低至正常速度的60-80％。 符号方向朝北。 最小面积：1.5 mm×1 mm（符号占地22.5 m×15 m）","icon":"images/isom2017img/407-Vegetation-slow-running-good-visibility.svg","standard":"isom2017"},{"code":"408","name":"慢行植被","name_en":"Vegetation walk","description":"有茂密树木或灌木丛（通视性低）的区域，通行速度降低至 正常速度的20-60％。 在某方向上具有更好通行性时，应在60%绿色面状符号上叠 加规则的白色/30％绿色条纹，以表示好跑方向。 最小面积：0.7 mm×0.7 mm（符号占地10.5 m×10.5 m）。 最小宽度：0.3 mm（符号占地4.5 m）","icon":"images/isom2017img/408-Vegetation-walk.svg","standard":"isom2017"},{"code":"409","name":"通视性好的慢行矮植被","name_en":"Vegetation walk good visibility","description":"通视性好但通行性降低至慢行的下层矮植被，植被类型通常 为矮灌木（荆棘、帚石楠、矮灌木丛、修剪后的树枝等下层矮植 被）。通行速度降低至正常速度的20-60％。 使用符号“难行植被（410）”来绘制难以穿越或无法通行 但通视性较好的区域。 符号方向朝北。 最小面积：1 mm×1 mm（符号占地15 m×15 m）","icon":"images/isom2017img/409-Vegetation-walk-good-visibility.svg","standard":"isom2017"},{"code":"410","name":"难行植被","name_en":"Vegetation fight","description":"几乎无法通行的具有茂密植被（树木或灌木丛）的区域，通 行速度降低至正常速度的20％以下。 在某方向上具有更好通行性时，应在绿色面状符号上叠加规 则的白色/30％绿色/60％绿色条纹，以表示好跑方向。 最小面积：0.55 mm×0.55 mm（符号占地8 m×8 m）。 最小宽度：0.25 mm（符号占地3.8 m）","icon":"images/isom2017img/410-Vegetation-fight.svg","standard":"isom2017"},{"code":"412","name":"耕地","name_en":"Cultivated land","description":"耕地，通常用于种植农作物。通行性可能因所种植的农作物 种类及季节而有所不同。对于种植农业林的区域，可以使用“好 跑树林（405）”或“稀树空旷地（402）”代替本符号。 由于通行性可能会有所不同，因此在线路设计时应避免穿越 此类区域。 该符号与符号“禁区（709）”叠加使用，以绘制禁止进入 的耕地。 符号方向朝北。 最小面积：3 mm×3 mm(符号占地45 m×45 m）","icon":"images/isom2017img/412-Cultivated-land.svg","standard":"isom2017"},{"code":"413","name":"果园","name_en":"Orchard","description":"通常以规则的方式种植果树或灌木的区域。规则点连线的 方向可以表示种植方向。 必须与符号“空旷地（401）”或“凌乱空旷地（403）”叠 加使用。 可以与“通视性好的慢跑矮植被（407）”或“通视性好的 慢行矮植被（409）”叠加使用以表示通行性降低。 最小面积：2 mm×2 mm（符号占地30 m×30 m）","icon":"images/isom2017img/413-Orchard.svg","standard":"isom2017"},{"code":"414","name":"葡萄园或类似区域","name_en":"Vineyard or similar","description":"葡萄园或类似植被的种植区，种植着浓密的单行植被，但在 种植方向上好跑。线的方向必须指示种植方向。应至少绘制三行 清晰可见的绿色线划。必须与符号“空旷地（401）”或“凌乱 空旷地（403）”叠加使用。 最小面积：2 mm×2 mm（符号占地30 m×30 m）","icon":"images/isom2017img/414-Vineyard-or-similar.svg","standard":"isom2017"},{"code":"415","name":"明显的种植界线","name_en":"Distinct cultivation boundary","description":"耕种植被（符号401、412、413、414）的界线或未用其他符 号（围栏、墙、路径等）绘制的耕地之间的界线。 最小长度：2 mm（符号占地30 m）","icon":"images/isom2017img/415-Distinct-cultivation-boundary.svg","standard":"isom2017"},{"code":"416","name":"明显的植被界线","name_en":"Distinct vegetation boundary","description":"树林中明显的植被分界线或明显的树林界线。 在同一幅地图上只能使用一种植被界线符号（黑色虚线或绿 色虚线）。对于具有大量岩石特征的区域，建议使用绿色虚线的 植被界线。 绿色虚线的缺点是不能用于绘制“难行植被（410）”周围 和内部的明显的植被界线。这种情况下的解决方法是使用符号“ 明显的种植界线（415）”代替。 最小长度，黑色虚线：5个点（2.0mm-符号占地30 m）。 最小长度，绿色虚线：4段线划（1.8 mm-符号占地27 m）。 颜色：深绿色（线状虚线）/黑色（点状虚线）。min.ø 0.2 0.8 面状0.14","icon":"images/isom2017img/416-Distinct-vegetation-boundary.svg","standard":"isom2017"},{"code":"417","name":"突出的大树","name_en":"Prominent large tree","description":"突出的独立大树（乔木），在绿色圆圈下方叠加白色底色 （OM-1.1mm），以提高其在黄色和绿色符号中的易读性。 符号占地：13.5 m×13.5 m","icon":"images/isom2017img/417-Prominent-large-tree.svg","standard":"isom2017"},{"code":"418","name":"突出的灌木或树","name_en":"Prominent bush or small tree","description":"突出的独立灌木或乔木，应谨慎使用此符号，因为它很容易 被误认为是“圆形土堆（109）”符号。内部的小白点用来帮助 色觉受损的运动员辨别符号。 符号占地：9.0 m×9.0 m","icon":"images/isom2017img/418-Prominent-bush-or-small-tree.svg","standard":"isom2017"},{"code":"419","name":"突出的特殊植被","name_en":"Prominent vegetation feature","description":"白色底色叠加在绿“×”下使用，以提高其在黄色和绿色符 号中的易读性(白色底色的线宽为0.36 mm，其在符号两端的长度 必须为0.36 mm)。 符号方向朝北。 必须在地图上给出符号定义。 符号占地：13.5 m×13.5 m。 0.91.1 0.2 0.180.9 0.9 3.5 人工地物3.5 人工地物 道路和路网为运动员提供了重要信息，分类必须在地图上清晰可见。较小的车道和小 径的分类对运动员特别重要。分类不仅要考虑到宽度，还要考虑到对运动员来说这条路的 明显程度。在地图上必须很容易识别出对运动员构成阻碍或障碍的人工地物，例如围栏、 墙壁、建筑物和禁区都很重要。人工地物对于读图和寻找检查点都很重要","icon":"images/isom2017img/419-Prominent-vegetation-feature.svg","standard":"isom2017"},{"code":"501","name":"铺装地面","name_en":"Paved area","description":"有坚硬表面如沥青、硬砾石、瓷砖、混凝土等的区域。铺装 地面在实地有明显界线时应绘制一条黑线作为边线（或轮廓）。 最小面积：1 mm×1 mm（符号占地15 m×15 m）","icon":"images/isom2017img/501-Paved-area.svg","standard":"isom2017"},{"code":"502","name":"宽公路","name_en":"Wide road","description":"宽度应依比例绘制，但绘制时不得小于符号的最小宽度 （0.3+2×0.14 mm -符号占地8.7 m）。如果特征物例如“围栏 （516）”、“难以穿越的围栏（518）”、“墙（513）”或“ 难以翻越的墙（515）”距离道路边缘很近，导致绘制时无法将 其显示为单独的符号，则可将公路外侧边线替换为其它黑色线状 符号。 黑线之间填充50%棕色。 一条有两列车道的公路可以用两个宽公路符号并排绘制，但 只在中间保留一条道路边线","icon":"images/isom2017img/502-Wide-road.svg","standard":"isom2017"},{"code":"503","name":"公路","name_en":"Road","description":"在任何天气下都适合机动车行驶的宽度小于5 m的有养护的 公路","icon":"images/isom2017img/503-Road.svg","standard":"isom2017"},{"code":"504","name":"车道","name_en":"Vehicle track","description":"无养护的车道:仅适合低速驶车的车道或无养护的公路。 对于明显的路口，交会点处于实线线划部位。 对于不明显的路口，在交会点处不连接。 最小长度（独立使用时)：两段线划(6.25 mm-符号占地94 m)","icon":"images/isom2017img/504-Vehicle-track.svg","standard":"isom2017"},{"code":"505","name":"步道","name_en":"Footpath","description":"好跑的步道、自行车道或旧车道。 对于明显的路口，交会点处于实线线划部位。 对于不明显的路口，在交会点处不连接。 最小长度(独立使用时):两段线划(4.25 mm-符号占地64 m)","icon":"images/isom2017img/505-Footpath.svg","standard":"isom2017"},{"code":"506","name":"小径","name_en":"Small footpath","description":"泛指小路。可跑的小径或（临时）林业采伐道，可以按比赛 速度奔跑。 对于明显的路口，交会点处于实线线划部位。 对于不明显的路口，在交会点处不连接。 最小长度(独立使用时):两段线划(2.25 mm-符号占地34 m)","icon":"images/isom2017img/506-Small-footpath.svg","standard":"isom2017"},{"code":"507","name":"不明显小径","name_en":"Less distinct small footpath","description":"不突出或不明显的可跑小径或林业采伐道。 最小长度：两段双划线（5.3 mm-符号占地79.5 m）","icon":"images/isom2017img/507-Less-distinct-small-footpath.svg","standard":"isom2017"},{"code":"508","name":"林中带状空隙","name_en":"Narrow ride or linear trace through the terrain","description":"在没有明显可跑路径地形上的树林空隙(例如：林间采伐 道，沙质道，滑雪道)或线性痕迹。通行性与周围环境不同时用 稍粗的黄色、绿色或白色底色线条叠加绘制。无底色线条时：代 表与周围环境具有相同的通行性。 100%黄色：易跑。 绿色中叠加白色背景线：正常奔跑速度。 30%绿色：慢跑。 60%绿色：慢行。 最小长度：两段线划(3.25 mm-符号占地48 m)","icon":"images/isom2017img/508-Narrow-ride-or-linear-trace-through-the-terrain.svg","standard":"isom2017"},{"code":"509","name":"铁路","name_en":"Railway","description":"铁路或其他类型的有轨轨道。 如果禁止沿铁路奔跑时必须与“禁行路线（711）”叠加使 用。如果铁路禁止翻越，必须与“禁区（520）”或“禁区（709 ）”叠加使用。 最小长度(独立使用时):两段线划（4 mm-符号占地60 m）","icon":"images/isom2017img/509-Railway.svg","standard":"isom2017"},{"code":"510","name":"输电线、索道或滑雪缆车线","name_en":"Power line cableway or skilift","description":"输电线、索道或滑雪缆车线。横线表示塔架的实际位置。为 了提高易读性，绘制时主线可能会被剪断。 如果某段电力线、索道或滑雪缆车线沿着道路或小径架设（ 且不提供明显的导航价值）则应省略。 最小长度（独立使用时）：5mm（符号占地：75m）","icon":"images/isom2017img/510-Power-line-cableway-or-skilift.svg","standard":"isom2017"},{"code":"511","name":"主干输电线","name_en":"Major powerline","description":"主干输电线应使用双线绘制。双线之间的间距可以表示输电 线的横向范围。为了提高易读性，主线可以会被剪断。横线表示 塔架的实际位置。超大承重塔架必须使用“建筑物（521）”符 号按平面轮廓绘制或使用符号“高塔（524）”","icon":"images/isom2017img/511-Major-powerline.svg","standard":"isom2017"},{"code":"512","name":"桥梁/隧道","name_en":"Bridge or tunnel","description":"桥梁和隧道用相同的基础符号绘制。 如果隧道（或桥下）无法通过，则必须省略此符号。 最小长度（基线）：0.4 mm（符号占地6 m）。 连接车道/路径的小桥应将路径的线划中心放在通过处。路 径在穿过水道处剪断表示没有桥梁。两侧无路连接的小步桥用一 段横线绘制","icon":"images/isom2017img/512-Bridge-or-tunnel.svg","standard":"isom2017"},{"code":"513.1","name":"可翻越的墙","name_en":"Wall","description":"由石头、混凝土、木头或其他材料搭建的重要墙体。 最小高度：1 m。 最小长度(独立使用时)：1.4 mm(符号占地21 m)","icon":"images/isom2017img/513.1-Wall.svg","standard":"isom2017"},{"code":"513.2","name":"可翻越的挡土墙","name_en":"Retained wall","description":"由石头、混凝土、木材或其他材料搭建的仅从一侧可见的可 翻越的挡土墙。半点必须指向较低的一侧。 最小高度：1 m。 最小长度（独立使用时）：2.4 mm（符号占地36 m）","icon":"images/isom2017img/513.2-Retained-wall.svg","standard":"isom2017"},{"code":"514","name":"残破的墙","name_en":"Ruined wall","description":"残破的或不明显的墙。最小高度0.5m。 最小长度：两段线划（3.65 mm-占地55 m）。如果更短，符 号必须放大到最小尺寸或更改为符号“墙（513）”绘制","icon":"images/isom2017img/514-Ruined-wall.svg","standard":"isom2017"},{"code":"515","name":"难以翻越的墙","name_en":"Impassable wall","description":"难以翻越的或难以穿越的墙，通常超过1.5m高。 最小长度(独立使用时)：3 mm(符号占地45 m)","icon":"images/isom2017img/515-Impassable-wall.svg","standard":"isom2017"},{"code":"516","name":"围栏","name_en":"Fence","description":"若围栏形成封闭区域，则齿线应朝向封闭区域内。 最小长度(独立使用时)：1.5 mm(符号占地22.5 m)","icon":"images/isom2017img/516-Fence.svg","standard":"isom2017"},{"code":"517","name":"残破的围栏","name_en":"Ruined fence","description":"残破的或不明显的围栏。若围栏形成封闭区域，则齿线应朝 向封闭区域内。 最小长度：两段线划(3.65 mm-符号占地55 m)。如果更短， 符号必须放大到最小尺寸或更改为符号“围栏(516)”","icon":"images/isom2017img/517-Ruined-fence.svg","standard":"isom2017"},{"code":"518","name":"难以穿越的围栏","name_en":"Impassable fence","description":"难以翻越的或难以穿越的围栏，通常超过1.5 m高。 若围栏形成封闭区域，则齿线应朝朝向封闭区域内。 最小长度(独立使用时)：2 mm(符号占地30 m)","icon":"images/isom2017img/518-Impassable-fence.svg","standard":"isom2017"},{"code":"519","name":"通过点","name_en":"Crossing point","description":"可穿过或翻越墙壁、围栏或其他线形特征的位置，包括围栏 门或翻越围墙、围栏所用的台阶、梯凳。 对于难以穿越的特征物，在通过点处必须剪断。对于可翻越 的特征物，如果通过点涉及一定程度的爬升，则在通过点处不得 剪断","icon":"images/isom2017img/519-Crossing-point.svg","standard":"isom2017"},{"code":"520","name":"禁区","name_en":"Area that shall not be entered","description":"例如私人住宅、花园、工厂或其他工业区等特征的禁止进入 的区域。只有等高线和突出特征才可以绘制在禁区内，如铁路和 大型建筑物等。黑色垂直线条纹符号可用于显示地形完整绘制的 重要区域（例如，当森林的一部分是禁止进入的区域时）。当有 道路或小径穿过时，此部分禁区符号应中断绘制。 边界清晰的禁止进入的区域，应以黑色边线或其他类型的黑 色线绘制，如果边界不清晰，则不得绘制黑色边线。临时禁区可 使用线路设计符号709绘制。 该符号的黑色垂直条纹朝北。 不得进入“禁区”内部。 最小面积：1 mm×1 mm(符号占地15 m×15 m)","icon":"images/isom2017img/520-Area-that-shall-not-be-entered.svg","standard":"isom2017"},{"code":"521","name":"建筑物","name_en":"Building","description":"在条件允许的情况下，应依比例绘制所有建筑物的平面图。 城区中大于75 m×75 m的建筑物绘制时可填充深灰色。 穿过建筑群的通道最小宽度为0.3 mm（符号占地4.5 m）。 应简化绘制禁止进入区内的建筑物。 不得绘制完全包含在建筑物内的区域（应绘制为建筑物的一 部分）。建筑物之间、建筑物与其他不可通行特征之间间距的最 小值必须为0.4 mm。 最小面积：0.5 mm×0.5 mm（符号占地7.5 m×7.5 m）","icon":"images/isom2017img/521-Building.svg","standard":"isom2017"},{"code":"522","name":"可通行建筑物","name_en":"Canopy","description":"可无障碍通行的有屋顶的建筑结构。 最小面积( 独立使用时 )：0.6 mm×0.6 mm( 符号占地9 m×9 m )。 最小宽度（内侧尺寸）：0.3 mm(符号占地4.5 m)","icon":"images/isom2017img/522-Canopy.svg","standard":"isom2017"},{"code":"523","name":"废墟","name_en":"Ruin","description":"毁坏或倒塌的建筑物。应依比例绘制废墟的平面轮廓。小到 无法依比例绘制的废墟可以用实线绘制。 最小面积( 内侧尺寸)：0.8 mm×0.8 mm( 符号占地12 m×12 m )。 100% 50%黄色 绿色 可选黑色 0.75 1.0 x 1.0 0.8 x 0.80.160.25 0.5","icon":"images/isom2017img/523-Ruin.svg","standard":"isom2017"},{"code":"524","name":"高塔","name_en":"High tower","description":"高塔或大型塔架。如果它在森林中，必须高于周围森林可 见。占地面积较大的塔必须使用符号“建筑物（521）”绘制。 符号方向朝北。 符号占地：直径21 m","icon":"images/isom2017img/524-High-tower.svg","standard":"isom2017"},{"code":"525","name":"小塔","name_en":"Small tower","description":"突出的小塔，平台或底座。符号的重心是实地精确位置。 符号方向朝北。 符号占地：15 m×15 m","icon":"images/isom2017img/525-Small-tower.svg","standard":"isom2017"},{"code":"526","name":"堆石标","name_en":"Cairn","description":"突出的堆石标（山顶标志或墓碑）、纪念碑、小纪念碑、界 碑、边界石标或测绘三角点石标。 最小高度：0.5 m。 符号占地：直径12 m","icon":"images/isom2017img/526-Cairn.svg","standard":"isom2017"},{"code":"527","name":"饲料架","name_en":"Fodder rack","description":"单独或附着在树上的饲料架。 符号的重心是实地精确位置。 符号方向朝北。 符号占地：13.5 m×13.5 m","icon":"images/isom2017img/527-Fodder-rack.svg","standard":"isom2017"},{"code":"528","name":"突出的线状地物","name_en":"Prominent line feature","description":"突出的人工线状地物。例如：较低的管道（输送天然气、 水、石油、热力等）或清晰可见的雪橇/旱橇轨。必须在地图上 给出符号的定义。 最小长度：1.5 mm(符号占地22.5 m）","icon":"images/isom2017img/528-Prominent-line-feature.svg","standard":"isom2017"},{"code":"529","name":"突出的难以翻越的线状地物","name_en":"Prominent impassable line feature","description":"难以翻越的突出人工线状地物。例如：高管道（输送天然 气、水、石油、热力等）或雪橇/旱橇轨。必须在地图上给出符 号的定义。 最小长度：2 mm(符号占地30 m)","icon":"images/isom2017img/529-Prominent-impassable-line-feature.svg","standard":"isom2017"},{"code":"530","name":"突出的特殊人工地物-〇","name_en":"Prominent man made feature ring","description":"符号的重心是实地精确位置。 必须在地图上给出符号定义。 符号占地：直径12 m","icon":"images/isom2017img/530-Prominent-man-made-feature-ring.svg","standard":"isom2017"},{"code":"531","name":"突出的特殊人工地物-×","name_en":"Prominent man made feature x","description":"符号的重心是实地精确位置。 符号方向朝北。 必须在地图上给出符号定义。 符号占地：12 m×12 m","icon":"images/isom2017img/531-Prominent-man-made-feature-x.svg","standard":"isom2017"},{"code":"532","name":"阶梯","name_en":"Stairway","description":"穿越或翻越特征物的明显阶梯，有助于爬上非常陡峭的山坡 或翻越难以翻越的特征物。通过石崖通道或难以翻越的特征物之 间的阶梯可以不绘制边线。 容易通行的阶梯或不明显的阶梯必须绘制为小径。阶梯的阶 线必须使用综合的方式绘制。 最小长度：3条(阶线)。 最小宽度：0.4 mm(内侧尺寸)。 0.80.8 0.10.1 3.6 技术符号3.6 技术符号","icon":"images/isom2017img/532-Stairway.svg","standard":"isom2017"},{"code":"601","name":"磁北线","name_en":"Magnetic north line","description":"磁北线是地图上指向磁北，与纸张的侧边平行的线。它们 在地图上的间距必须为20 mm，在1:15 000比例尺的地面上代表 。如果地图放大到1:10 000，则地图上磁北线的间距为 。 当磁北线遮挡小细节时必须剪断它们以提高地图的易读性。 在水系很少的地区，可以使用蓝线","icon":"images/isom2017img/601-Magnetic-north-line.svg","standard":"isom2017"},{"code":"602","name":"十字套准线","name_en":"Registration mark","description":"地图的四角可放置至少三个十字套准线。这些套准线用于在 已经印刷好的地图上打印线路图。此外，它还可以用于检查分色 印刷时是否印准","icon":"images/isom2017img/602-Registration-mark.svg","standard":"isom2017"},{"code":"603","name":"高程注记","name_en":"Spot height","description":"高程注记用于粗略估计高程。以米（m）为单位绘制附近的 高程。水面高程不需要绘制注记点。高程注记放置在不遮挡其他 符号的位置。 字体：无衬线字体，高1.5 mm,非粗体,非斜体。 353.7 线路设计符号3.7 线路设计符号 线路设计符号的尺寸以毫米（mm）为单位，印刷比例为1:15 000。对于比例尺较大的 地图，符号必须按比例放大（1:10 000放大至150%，1:5 000放大至300%）。 所有线路设计符号必须打印在地图其他内容之上。它们不得掩盖黑色、棕色和100%蓝 色的地图细节。 本节的插图尺寸为1:15本节的插图尺寸为1:15 000比例尺地图的尺寸。000比例尺地图的尺寸","icon":"images/isom2017img/603-Spot-height.svg","standard":"isom2017"},{"code":"701","name":"起点","name_en":"Start","description":"定向运动比赛开始的地方。三角形的中心是定向运动线路起 点的精确位置。起点必须在地图清晰可辨认的位置。三角形其中 一个顶点指向第一个检查点的方向","icon":"images/isom2017img/701-Start.svg","standard":"isom2017"},{"code":"702","name":"取图点","name_en":"Map issue point","description":"如果有前往起点的必经线路，则使用此符号标记取图点","icon":"images/isom2017img/702-Map-issue-point.svg","standard":"isom2017"},{"code":"703","name":"检查点","name_en":"Control point","description":"对于点状特征物，检查点的中心必须为点状特征物符号的中 心。 对于线状和面状特征物，检查点的中心表示点标旗的精确位 置。检查点必须放置在地图清晰可见的位置。 遮挡的重要细节处的圆圈部分应剪断。 符号占地：75m。 704 检查点序号 (T)704 检查点序号 (T) 检查点序号靠近检查点圆圈放置，不得遮挡地图的重要细 节。这些数字朝北。 字体：Arial，4.0mm，非粗体，非斜体","icon":"images/isom2017img/703-Control-point.svg","standard":"isom2017"},{"code":"705","name":"线路连线","name_en":"Course line","description":"如果需按顺序到访检查点，则用直线从起点到第一个检查 点，然后依次连接剩下的检查点来显示顺序。遮挡重要细节时应 剪断此部分的连线。连线需要指向经过的强制通过点。为了增加 靠近检查点圆圈底层细节的易读性，连线与圆圈之间应留有间 隙","icon":"images/isom2017img/705-Course-line.svg","standard":"isom2017"},{"code":"706","name":"终点","name_en":"Finish","description":"线路结束处","icon":"images/isom2017img/706-Finish.svg","standard":"isom2017"},{"code":"707","name":"必经线路","name_en":"Marked route","description":"有标记的一段线路，必经线路是线路的一部分。必须沿必经 线路行进。 最小长度：2段线划（4.5 mm–符号占地：67.5 m）","icon":"images/isom2017img/707-Marked-route.svg","standard":"isom2017"},{"code":"708","name":"禁过线","name_en":"Out-of-bounds boundary","description":"禁止穿越的界线。 禁止穿越本符号。 最小长度：1 mm（符号占地：15 m）","icon":"images/isom2017img/708-Out-of-bounds-boundary.svg","standard":"isom2017"},{"code":"709","name":"禁区","name_en":"Out-of-bounds area","description":"禁入的区域。如果没有自然边界，则可以如下绘制边线： • 实线表示禁区边界在实地有连续的标志物（警戒带等）。 • 虚线表示禁区边界在实地有不连续的标志物。 • 无边线表示禁区边界在实地没有标志物。 禁止进入禁区。 最小面积：2 mm×2 mm(符号占地30 m×30 m)","icon":"images/isom2017img/709-Out-of-bounds-area.svg","standard":"isom2017"},{"code":"710","name":"通过点","name_en":"Crossing point","description":"例如穿越或翻越墙、围栏、公路、铁路、隧道、禁区、禁过 线的通过点，本符号在地图上用绘有两条向外弯曲的线绘制。这 些线必须依比例绘制","icon":"images/isom2017img/710-Crossing-point.svg","standard":"isom2017"},{"code":"711","name":"禁行路线","name_en":"Out-of-bounds route","description":"禁行的路线。运动员可以快速横穿禁行路线，但不得沿该路 线行进。禁行路线不得独立使用时。 最小长度：2个符号（6 mm–占地90 m）","icon":"images/isom2017img/711-Out-of-bounds-route.svg","standard":"isom2017"},{"code":"712","name":"急救点","name_en":"First aid post","description":"提供医疗急救服务的位置","icon":"images/isom2017img/712-First-aid-post.svg","standard":"isom2017"},{"code":"713","name":"补给点","name_en":"Refreshment point","description":"与检查点不在同一位置的补给点。","icon":"images/isom2017img/713-Refreshment-point.svg","standard":"isom2017"}];

const ISSPR_DATA = [{"code":"101","name":"首曲线（基本等高线）","name_en":"Contour","description":"首曲线是地面上高程相等的各相邻点所连成的闭合曲线。 标准等高距为2m或2.5m。为了突出三维效果，首曲线必须绘制为 为穿过所有符号的连续的线，也包括“建筑物（521）”和“可 通行的建筑物（522）”。 示坡线绘制在首曲线较低的一侧用来指示下坡方向，使用时 将示坡线放置在山凹处。 为有更好的易读性如果首曲线遮挡以下符号时必须剪开， 例如：“小土垄（105）”、“小凹地（111）”、“坑或洞 （112）”、“突出的特殊地貌（115）”、“阶梯（532）”。 当首曲线遮挡“圆形土堆（109）”或“狭长土堆（110）”时应 调整首曲线的位置，如条件不允许调整位置则剪开首曲线，以避 免相互接触。 绝对高程并不那么重要，但相邻特征之间的相对高度应在 地图上尽可能精确地绘制出来。为更加突出的绘制地貌特征，允 许稍微改变首曲线位置，但变化不应超过等高距的25%，并且必 须注意相邻地物。首曲线最小弯曲外端处顶点线中心到主线所处 线中心的距离为0.4 mm。 0.210.75min = 最小尺寸","icon":"images/issprom2019-2/101-Contour.svg","standard":"issprom2019"},{"code":"102","name":"计曲线（加粗等高线）","name_en":"Index contour","description":"为快速判读高度差和地貌的整体起伏，每隔四条首曲线必 须绘制一条较粗的计曲线。在细节较多的区域计曲线可以用“首 曲线（101）”代替。 可以绘制等高线注记以帮助运动员估算较大的高度差。等 高线注记的顶部方向必须朝向等高线的较高侧。在计曲线上绘制 等高线注记时不能遮挡其他细节。 字体：Arial，高1.52 mm，字号6 pt,非粗体，非斜体，无 衬线","icon":"images/issprom2019-2/102-Index-contour.svg","standard":"issprom2019"},{"code":"103","name":"间曲线（半距等高线）","name_en":"Form line","description":"间曲线又名半距等高线。间曲线用于绘制更详尽的地貌信 息。间曲线仅在首曲线无法绘制的情况下使用。在两条相邻等高 线之间仅可绘制一条间曲线","icon":"images/issprom2019-2/103-Form-line.svg","standard":"issprom2019"},{"code":"104","name":"土崖","name_en":"Earth bank","description":"陡峭的土崖（土坎）是指可与周围环境明显区分出来的地 面高度骤变的地貌，例如砾石坑或沙坑，公路或铁路的路堑或路 堤。齿线的长度表示整个土崖坡面的水平延伸范围，如果两个土 崖紧邻，则可以省略齿线。禁止翻越的土崖必须使用“禁止翻越 的石崖（201）”绘制。高土崖可选用线粗0.37 mm的主线","icon":"images/issprom2019-2/104-Earth-bank.svg","standard":"issprom2019"},{"code":"105.1","name":"小土垄","name_en":"Small earth wall","description":"小而明显的土垄，通常是人造的。较宽的土垄应使用“首 曲线（101）”、“间曲线（103）”或“土崖（104）”绘制。 最小高度：0.5 m。 最小长度：1.4 mm（符号占地5.6 m）","icon":"images/issprom2019-2/105.1-Earth-wall.svg","standard":"issprom2019"},{"code":"105.2","name":"挡土墙","name_en":"Retaining earth wall","description":"由人工修筑形成的较低挡土结构，使地面高度发生明显变化，并能与周围地形清晰区分。常用于表示泥炭地边缘或耕作梯田边缘。若高度超过1米，应使用符号104（土崖/土坎）。","icon":"images/issprom2019-2/105.2-Retaining-earth-wall.svg","standard":"issprom2019"},{"code":"107","name":"冲沟或壕沟","name_en":"Erosion gully or trench","description":"用单线绘制因太小而不能用“土崖（104）”、“首曲线 （101）”、“计曲线（102）”或“间曲线（103）”绘制的冲 沟或壕沟。符号的两端是尖的。应剪开此符号周围的等高线以提 高易读性。 最小深度：1 m。 最小长度：2.0 mm（符号占地8 m）","icon":"images/issprom2019-2/107-Erosion-gully-or-trench.svg","standard":"issprom2019"},{"code":"108","name":"小冲沟","name_en":"Small erosion gully","description":"小的冲沟或小壕沟。应剪开此符号周围的等高线以提高易 读性。 最小深度：0.5 m。 最小长度（独立使用时）：2个点（1 mm–符号占地4 m）","icon":"images/issprom2019-2/108-Small-erosion-gully.svg","standard":"issprom2019"},{"code":"109","name":"圆形圆形 土堆","name_en":"Small knoll","description":"无法用“首曲线（101）”、“计曲线（102）”或“间曲 线（103）”依比例绘制的小而明显的土堆、小丘或石质突起。 符号不得接触或重叠等高线。 最小高度：0.5 m。 符号占地：直径3 m","icon":"images/issprom2019-2/109-Small-knoll.svg","standard":"issprom2019"},{"code":"110","name":"狭长土堆","name_en":"Small elongated knoll","description":"无法依比例用“首曲线（101）”、“计曲线（102）” 或“间曲线（103）”绘制的小而明显狭长的土堆、小丘或石质 突起。最大长度6 m，最大宽度2 m。大于该尺寸的必须使用等高 线绘制。此符号禁止编辑，符号间禁止接触或重叠。同时此符号 禁止接触、重叠等高线，符号长轴方向同实地土堆长轴朝向。 最小高度：0.5 m。 符号占地：4.8 m×2.4 m","icon":"images/issprom2019-2/110-Small-elongated-knoll.svg","standard":"issprom2019"},{"code":"111","name":"小凹地","name_en":"Small depression","description":"太小而无法用“首曲线（101）”或“间曲线（103）”绘 制的没有陡边的小凹地或凹陷。此符号不得与其他棕色符号接触 或重叠。符号方向朝北。 最小深度：0.5m。 最小宽度：1m。 符号占地：4.8m×2.4m","icon":"images/issprom2019-2/111-Small-depression.svg","standard":"issprom2019"},{"code":"112","name":"土土坑或土洞","name_en":"Pit or hole","description":"太小而无法用“土崖（104）”符号绘制的具有明显陡峭边 缘的土坑或土洞。符号方向朝北。 最小深度：0.5 m。 最小宽度：1 m。 符号占地：4.4 m×5.0 m","icon":"images/issprom2019-2/112-Pit-or-hole.svg","standard":"issprom2019"},{"code":"113","name":"坑洼地面","name_en":"Broken ground","description":"凹坑和/或土堆太复杂而无法详细绘制的地面。点的位置应 随机绘制，点的密度可根据实地地面细节而变化。符号不应干扰 重要地貌特征或地物的绘制。在坑洼地面的区域不得剪开等高 线。不得排列成单点线的式样","icon":"images/issprom2019-2/113-Broken-ground.svg","standard":"issprom2019"},{"code":"115","name":"突出的特殊地貌","name_en":"Prominent landform feature","description":"小而重要或突出的地貌。符号方向朝北。符号不得与等高 线或其他棕色符号接触或重叠。 必须在地图上给出符号的定义。 符号占地：5.4 m×4.6 m","icon":"images/issprom2019-2/115-Prominent-landform-feature.svg","standard":"issprom2019"},{"code":"201","name":"禁止翻越的石崖","name_en":"Uncrossable cliff","description":"禁止翻越的石崖、采石场或禁止翻越的土崖[详见土崖 (104)]。 齿线朝向低侧，齿线长度表示整个石崖坡面的水平延伸范 围。对于垂直的岩壁，如果空间很小，可以省略齿线，例如石崖 之间的狭窄通道（通道的宽度应至少为0.4mm）。齿线可以在岩 面正下方的其他面状符号上延伸绘制。当禁止翻越的石崖垂直落 入水中，运动员无法沿着石崖的下边缘穿越时，可省略水岸线， 或者齿线必须清晰地延伸到水岸线上。禁止翻越的石崖下坡方向 应与等高线的下坡方向相对应。 最小高度：1.5 m。 最小长度：1.1 mm（符号占地4.4 m）","icon":"images/issprom2019-2/201-Uncrossable-cliff.svg","standard":"issprom2019"},{"code":"202","name":"可翻越的石崖","name_en":"Passable rock face","description":"可翻越的石崖（岩壁）或采石场。 小而垂直的岩壁可以使用没有齿线的符号绘制。如果从等 高线上看不出石崖的朝向，为提高易读性，应在石崖低侧绘制短 的齿线。对于非垂直的石崖，齿线长度表示石崖坡面的水平延伸 范围。对于没有齿线的可翻越的石崖，必须使用圆型末端式样的 基线以提高易读性。 最小高度：0.6 m。 最小长度：1.1 mm（符号占地：4.4 m）","icon":"images/issprom2019-2/202-Passable-rock-face.svg","standard":"issprom2019"},{"code":"203","name":"岩坑或山洞","name_en":"Rocky pit or cave","description":"可能对运动员构成危险的岩坑、土坑、山洞或矿井。符号 的重心是实地精确位置，除具有明显入口的山洞，符号方向必须 朝北，山洞的符号方向应指向洞口外。 最小深度：0.5 m。 符号占地：4.4 m×5.0 m","icon":"images/issprom2019-2/203-Rocky-pit-or-cave.svg","standard":"issprom2019"},{"code":"204","name":"石块","name_en":"Boulder","description":"小而明显的石块。 地图上绘制的所有石块都必须能快速的在实地辨识。 符号占地：直径2.4 m","icon":"images/issprom2019-2/204-Boulder.svg","standard":"issprom2019"},{"code":"205","name":"大石块","name_en":"Large boulder","description":"特别大而明显的石块。 符号占地：直径3.6 m","icon":"images/issprom2019-2/205-Large-boulder.svg","standard":"issprom2019"},{"code":"206","name":"巨石或岩柱","name_en":"Gigantic boulder or rock pillar","description":"必须按平面轮廓形状绘制超大的石块，岩柱或巨大的岩 壁。地图中的形状和尺寸可能和插图不同。 地图上巨石间或与其他无法通行的特征符号之间的距离必 须超过0.15 mm。 最小宽度：0.3 mm。 最小面积：0.75 mm²（符号占地12 m²）","icon":"images/issprom2019-2/206-Gigantic-boulder-or-rock-pillar.svg","standard":"issprom2019"},{"code":"207","name":"石群","name_en":"Boulder cluster","description":"众多堆积在一起无法单独绘制的石头。石群中的石头应高 于0.5m。石群必须为一组易于识别的石块群。为了能够显示相邻 石群（最大间距为8m）之间的区别，对于大小存在显著差异的石 群之间，允许将该符号放大20％（边长1.44mm）来绘制。符号方 向朝北。 符号占地：4.8 m×4.0 m。 1.10.251.251.1 (1.44)最大. 2.01.2","icon":"images/issprom2019-2/207-Boulder-cluster.svg","standard":"issprom2019"},{"code":"208","name":"石块地","name_en":"Boulder field","description":"随机分布着众多无法单独绘制的石块的区域。三角形的密 度越大越降低通行性。符号最小尺寸必须绘制两个三角形。为了 能够显示在石块地内高度差异明显的区域，可以将部分三角形放 大至120％","icon":"images/issprom2019-2/208-Boulder-field.svg","standard":"issprom2019"},{"code":"210","name":"碎石地","name_en":"Stony ground","description":"降低了通行性的布满碎石或小石块的区域。 点的密度必须根据碎石的数量绘制，且点的位置应随机分 布，但不干扰重要地貌特征或地物的绘制。符号最小尺寸必须绘 制三个点。为避免与“明显的植被界线（416）”符号混淆，不 得排列成单点线的式样。 密度：最少3个点","icon":"images/issprom2019-2/210-Stony-ground.svg","standard":"issprom2019"},{"code":"213","name":"空旷的沙地","name_en":"Open sandy ground","description":"没有植被的通行性降低的沙质地面或软砾石区域。如果沙 质区域是空旷的并且具有良好的通行性，则用“空旷地（401 ）”、“稀树空旷地（402）”或“铺装地面（501）”绘制。黑 点不得干扰其他黑色符号。 最小宽度：0.3 mm。 最小面积：1 mm²（符号占地16 m²）","icon":"images/issprom2019-2/213-Open-sandy-ground.svg","standard":"issprom2019"},{"code":"214","name":"裸岩地","name_en":"Bare rock","description":"没有泥土或植被覆盖的可通行的岩面区域。 覆有草、苔藓或其他低矮植被的岩石区域必须根据其通视 性和通行性用（401/402/403/404）来绘制。 最小宽度：0.25 mm。 最小面积：1 mm²（符号占地16 m²）。 0.5ø0.18 45º","icon":"images/issprom2019-2/214-Bare-rock.svg","standard":"issprom2019"},{"code":"301","name":"禁止穿越的水域","name_en":"Uncrossable body of water","description":"可能对运动员产生危险的深水区域，如湖泊、池塘、河流 或喷泉。蓝色填充面和黑色轮廓线表示禁止穿越该符号。 最小宽度：0.3 mm。 最小面积（内部）：0.5 mm²（符号占地8m²） 色。0.18最小宽度: 0.3 100% (70%)","icon":"images/issprom2019-2/301-Uncrossable-body-of-water.svg","standard":"issprom2019"},{"code":"302","name":"可穿越的浅水域","name_en":"Crossable body of water","description":"可穿越的浅水区域，如可以穿越的池塘、河流或喷泉。水 深度应小于0.5m并且可以穿越。如果水体禁止穿越，则必须使用 禁止穿越的水域（301）绘制。如果边界没有与其他线状符号接 触，则轮廓必须用蓝线绘制。 最小宽度：0.3 mm。 最小面积（内部）：0.5 mm²（符号占地8m²）","icon":"images/issprom2019-2/302-Crossable-body-of-water.svg","standard":"issprom2019"},{"code":"303","name":"水坑","name_en":"Waterhole","description":"积满水的坑或太小而无法依比例绘制的水域。符号的重心 是实地精确位置，符号方向朝北。 符号占地：4.4 m×5.0 m","icon":"images/issprom2019-2/303-Waterhole.svg","standard":"issprom2019"},{"code":"305","name":"可穿越的小水道","name_en":"Crossable small watercourse","description":"宽度小于2m的可穿越穿越的水道。 最小长度：1 mm（符号占地4 m）","icon":"images/issprom2019-2/305-Crossable-small-watercourse.svg","standard":"issprom2019"},{"code":"306","name":"次要/季节性水渠","name_en":"Minor seasonal watercourse","description":"可能季节性有水的天然或人造的次要水渠。 最小长度（独立使用时）：两段线划（4.11 mm–符号占地 ）","icon":"images/issprom2019-2/306-Minor-seasonal-watercourse.svg","standard":"issprom2019"},{"code":"307","name":"禁止穿越的沼泽","name_en":"Uncrossable marsh","description":"禁止穿越或对运动员可能存在危险的沼泽。 该符号禁止穿越。至少绘制两条清晰可见的蓝色线划。符 号方向朝北。 最小宽度：两行蓝线","icon":"images/issprom2019-2/307-Uncrossable-marsh.svg","standard":"issprom2019"},{"code":"308","name":"可穿越的可穿越的 沼泽","name_en":"Marsh","description":"可穿越的沼泽，通常具有明显的边缘。必须叠加其他符号 以显示通行性和通视性。至少绘制两条清晰可见的蓝色线划。符 号方向朝北。 最小宽度：两行蓝线","icon":"images/issprom2019-2/308-Marsh.svg","standard":"issprom2019"},{"code":"309","name":"狭窄的沼泽","name_en":"Narrow marsh","description":"因太狭窄而不能用“可穿越的沼泽（308）”符号绘制的沼 泽或涓涓细流。 最小长度（ 独立使用时 ）:两个点( 最小长度1 mm-符号占地4m )","icon":"images/issprom2019-2/309-Narrow-marsh.svg","standard":"issprom2019"},{"code":"310","name":"不明显的沼泽","name_en":"Indistinct marsh","description":"可以穿越的不明显的季节性沼泽或从沼泽到坚实地面的过 渡区域。边界通常不明显，植被与周围区域相似。该符号必须叠 加其他符号以显示通行性和通视性，至少绘制三条清晰可见的蓝 色线划。符号方向朝北","icon":"images/issprom2019-2/310-Indistinct-marsh.svg","standard":"issprom2019"},{"code":"311","name":"井或小喷泉","name_en":"Small fountain or well","description":"直径至少为1 m的井或小喷泉。 最小深度：0.5 m。 符号占地：3.6 m×3.6 m","icon":"images/issprom2019-2/311-Small-fountain-or-well.svg","standard":"issprom2019"},{"code":"312","name":"泉源","name_en":"Spring","description":"伴有明显泉涌的水源。符号的重心是实地精确位置。 符号方向朝向下游。 符号占地：4.8 m×2.4 m","icon":"images/issprom2019-2/312-Spring.svg","standard":"issprom2019"},{"code":"313","name":"突出的特殊水体","name_en":"Prominent water feature","description":"明显或突出的特殊小水体。该符号方向朝北。必须在地图上给出符号的定义。","icon":"images/issprom2019-2/313-Prominent-water-feature.svg","standard":"issprom2019"},{"code":"401","name":"空旷地","name_en":"Open land","description":"通行性好的耕地、草坪、田野、牧场、草原、树皮覆盖地 等没有树木的区域。 最小宽度：0.3 mm。 最小面积：0.5 mm²（符号占地8 m²）","icon":"images/issprom2019-2/401-Open-land.svg","standard":"issprom2019"},{"code":"402","name":"稀树空旷地","name_en":"Open land with scattered trees","description":"空旷地上零散分布着树木或灌木丛等地面覆盖物的通行性 好的区域。符号的点可以是白色的（零散分布的乔木）或绿色的 （零散分布的灌木/灌木丛）。可以叠加符号“突出的大树（417 ）”和“突出的灌木丛或小树（418）”绘制特别突出的树。该 符号方向朝北。 最小宽度：2.2 mm。 最小面积：6.25 mm²（符号占地100m²）。 较小的区域必须被省、夸大或使用符号空旷地(401）绘制","icon":"images/issprom2019-2/402-Open-land-with-scattered-trees.svg","standard":"issprom2019"},{"code":"403","name":"凌乱空旷地","name_en":"Rough open land","description":"荒野、高沼地、砍伐地、树木新植区（树高低于1 m）或其 他具有凌乱地表植被如帚石楠或高草覆盖的空旷地。此符号可与 下列植被符号叠加：“通视性好的慢跑矮植被(407)”、 “通视性好的慢行矮植被（409）”，以表示通行性降低。 最小面积：1 mm²（符号占地16 m²）","icon":"images/issprom2019-2/403-Rough-open-land.svg","standard":"issprom2019"},{"code":"404","name":"凌乱稀树空旷地","name_en":"Rough open land with scattered trees","description":"凌乱空旷地上零散分布着树木或灌木的区域。符号的点可 以是白色（零散分布的乔木）或绿色（零散分布的灌木/灌木 丛）。可以叠加符号“突出的大树（417）”和“突出的灌木或 小树（418）”绘制特别突出的树。只有带白点的符号可以与以 下植被符号叠加以表示通行性降低：“通视性好的慢跑矮植被 （407）”、“通视性好的慢行矮植被（409）”。 最小宽度：2.5 mm。 最小面积：6.25 mm²（符号占地100m²）。 较小的区域必须省略、夸大或使用符号“凌乱空旷地（403 ）”或“树林（405）”绘制","icon":"images/issprom2019-2/404-Rough-open-land-with-scattered-trees.svg","standard":"issprom2019"},{"code":"405","name":"好跑树林","name_en":"Forest","description":"针对特定地形的典型开阔树林。如果没有可以轻松通行的 树林区域，则地图上不应出现白色。 最小宽度（剪孔时）：0.3 mm。 最小面积：最小面积1 mm²（符号占地16m²）；“慢行植被 （408）”和“空旷地（401）”符号中最小面积为0.5mm²（符号 占地8m²）；“不能穿越植被（410）”中最小面积为0.3mm²（符 号占地5m²）","icon":"images/issprom2019-2/405-Forest.svg","standard":"issprom2019"},{"code":"406","name":"慢跑植被","name_en":"Vegetation slow running","description":"植被茂密（通视性差）的区域，通行性降低至正常速度的 60%—80%。在某方向上具有更好通行性时，使用规则的白色条纹 表示具有更好通行性的方向。至少绘制两条清晰可见的白色条 纹。 最小宽度：0.4 mm。 最小面积：1 mm²（符号占地16 m²）","icon":"images/issprom2019-2/406-Vegetation-slow-running.svg","standard":"issprom2019"},{"code":"407","name":"通视性好的慢跑矮植被","name_en":"Vegetation slow running good visibility","description":"通视性好但通行性降低至慢跑的下层矮植被，植被类型通 常为矮灌木（荆棘、帚石楠、矮灌木丛、修剪后的树枝等）。通 行速度降低至正常奔跑速度的60%—80％。此符号禁止与“慢跑 植被（406）”或“慢行植被（408）”叠加使用。 最小宽度：两行绿线","icon":"images/issprom2019-2/407-Vegetation-slow-running-good-visibility.svg","standard":"issprom2019"},{"code":"408","name":"慢行植被","name_en":"Vegetation walk","description":"有茂密的树木或灌木丛（通视性好）的区域，通行速度减 少至正常速度的20-60％。在某方向上具有更好通行性时，使用 白色或30％绿色的规则条纹以表示更好通行性的方向。至少绘制 两条清晰可见的白色或30%绿色条纹。 最小宽度：0.4 mm。 最小面积：0.5 mm²（符号占地8m²）","icon":"images/issprom2019-2/408-Vegetation-walk.svg","standard":"issprom2019"},{"code":"409","name":"通视性好的慢行矮植被","name_en":"Vegetation walk good visibility","description":"通视性好但通行性降低至慢行的下层矮植被，植被类型通 常为矮灌木（荆棘，帚石楠，矮灌木丛，修剪后的树枝等下层矮 植被）。通行速度降低至正常奔跑速度的20%—60％。此符号禁 止与“慢跑植被（406）”或“慢行植被（408）”叠加使用。 最小宽度：2行绿线","icon":"images/issprom2019-2/409-Vegetation-walk-good-visibility.svg","standard":"issprom2019"},{"code":"410","name":"难行植被","name_en":"Vegetation fight","description":"几乎无法通行的茂密植被（树木或灌木丛）的区域。通行 速度几乎为0。 在某方向上具有更好通行性时，绘制白色/30%绿色/60%绿 色的规则条纹以表示更好的通行方向。至少绘制两条清晰可见的 条纹。 最小面积：0.3 mm2（符号占地5 m2）。 最小宽度：0.25 mm","icon":"images/issprom2019-2/410-Vegetation-fight.svg","standard":"issprom2019"},{"code":"411","name":"禁行植被","name_en":"Uncrossable vegetation","description":"禁止通行的植被是指禁止穿越或翻越的植被区域（例如树 篱），因为可能存在私有财产或植被本身受损的危险。 最小面积：0.3 mm2（符号占地5 m2）。 最小宽度：0.4 mm","icon":"images/issprom2019-2/411-Uncrossable-vegetation.svg","standard":"issprom2019"},{"code":"412","name":"耕地","name_en":"Cultivated land","description":"耕地，常用于种植农作物。通行性可能因种植的农作物的 种类及季节而有所不同。由于通行性具有不确定性，因此在线路 设计时应避免穿越此类区域。该符号与“禁区（709）”叠加使 用以表示禁止进入的耕地。符号方向朝北。 最小宽度：3 mm。 最小面积：9 mm²（符号占地144 m²）","icon":"images/issprom2019-2/412-Cultivated-land.svg","standard":"issprom2019"},{"code":"413","name":"果园","name_en":"Orchard","description":"通常以规则的方式种植果树或灌木的区域。规则点形成线 的方向可以显示种植方向。规定至少要绘制四个清晰可见的点。 必须与“空旷地（401）”或“凌乱空旷地（403）”叠加使用。 最小宽度：2 mm。 最小面积：4 mm²（符号占地64 m²）","icon":"images/issprom2019-2/413-Orchard.svg","standard":"issprom2019"},{"code":"414","name":"葡萄园或类似区域","name_en":"Vineyard or similar","description":"葡萄园或类似植被的种植区，种植着浓密的单行植被，但 在种植方向上好跑。线的方向必须指示种植方向。至少要绘制三 行清晰可见的绿色线划。必须与符号“空旷地（401）”或“凌 乱空旷地（403）”叠加使用。 最小宽度：2 mm。 最小面积：4 mm²（符号占地64 m²）。 0.8","icon":"images/issprom2019-2/414-Vineyard-or-similar.svg","standard":"issprom2019"},{"code":"415","name":"明显的种植界线","name_en":"Distinct cultivation boundary","description":"耕种植被（符号401、412、413、414）的边界线或未用其 他符号（栅栏、墙、路径等）绘制的耕地之间的边界线。 最小长度：1 mm（符号占地4 m）","icon":"images/issprom2019-2/415-Distinct-cultivation-boundary.svg","standard":"issprom2019"},{"code":"416","name":"明显的植被界线","name_en":"Distinct vegetation boundary","description":"树林中非常明显的植被分界线或树林边界线。 对不明显的界线仅通过颜色和/或网状符号的变化来表示。 最小长度（独立使用时）：五个点（2.65 mm-符号占地 ）","icon":"images/issprom2019-2/416-Distinct-vegetation-boundary.svg","standard":"issprom2019"},{"code":"417","name":"突出的大树","name_en":"Prominent large tree","description":"突出的独立大树（乔木）。 在绿色圆圈下叠加白色底色，以提高其在黄色和绿色符号 中的易读性 (OM )。 符号占地：直径4.8 m（外部尺寸5.6 m）","icon":"images/issprom2019-2/417-Prominent-large-tree.svg","standard":"issprom2019"},{"code":"418","name":"突出的灌木或树","name_en":"Prominent bush or small tree","description":"突出的独立灌木丛或小乔木。 中间的小白点有助于帮助色觉受损的运动员识别符号。 符号占地：直径3.2 m","icon":"images/issprom2019-2/418-Prominent-bush-or-small-tree.svg","standard":"issprom2019"},{"code":"419","name":"突出的特殊植被","name_en":"Prominent vegetation feature","description":"重要或突出的特殊植被。 白色底色叠加在绿“×”下使用，以提高在黄色和绿色 符号中的易读性（白色底色的线宽0.5 mm，必须长于符号末端 ）。 符号方向朝北。 必须在地图上给出符号的定义。 符号占地：4.8 m×4.8 m（外部尺寸7.1 m×7.1 m）","icon":"images/issprom2019-2/419-Prominent-vegetation-feature.svg","standard":"issprom2019"},{"code":"501","name":"铺装地面","name_en":"Paved area","description":"有沥青、硬砾石、瓷砖、混凝土等坚硬表面的区域。它应 以“铺装地面边线或台阶线（501.1）”作为边线（或轮廓）。 如果铺装地面的差异可用于导航，则可以用符号“铺装地面边线 或台阶线（501.1）”绘制。黑色边线在符合逻辑的地方可以省 略（例如从砾石到草地的不明显/渐变过渡区）。 车道或人行道路的路况必须用不同的棕色绘制。 量大处为50%，黑色","icon":"images/issprom2019-2/501-Paved-area.svg","standard":"issprom2019"},{"code":"501.1","name":"铺装地面边线或台阶线","name_en":"Step or edge of paved area","description":"铺装地面边缘线。 如果没有导航作用则省略铺装地面内部的线","icon":"images/issprom2019-2/501.1-Step-or-edge-of-paved-area.svg","standard":"issprom2019"},{"code":"501.2","name":"底层的铺装地面边线或阶梯线","name_en":"Step or edge of paved area at lower level","description":"该符号仅适用于两层大面积通行结构中，具有导航作 用的底层的铺装地面边线或阶梯线。线路两端的制图间距为","icon":"images/issprom2019-2/501.2-Step-or-edge-of-paved-area-at-lower-level.svg","standard":"issprom2019"},{"code":"501.3","name":"稀树铺装地面","name_en":"Paved area with scattered trees","description":"有分散的树木或灌木丛的铺装地面。 最小宽度：2.2 mm 最小面积：6.25 mm²（符号占地100 m²） 较小的区域须省略、夸大或使用“铺装地面（501）”绘 制","icon":"images/issprom2019-2/501.3-Paved-area-with-scattered-trees.svg","standard":"issprom2019"},{"code":"505","name":"无铺装的步道或车道","name_en":"Unpaved footpath or track","description":"主要以慢行的方式通过的无铺装的步道或坑洼的车道，没 有平整、坚硬的路面。颜色应与符号“铺装地面（501）”相 同。 交通量较大0.1 30% 0.75ø0.630% (50%) 45º","icon":"images/issprom2019-2/505-Unpaved-footpath-or-track.svg","standard":"issprom2019"},{"code":"506","name":"无铺装的小径或小车道","name_en":"Small unpaved footpath or track","description":"无铺装的小径或小车道。 最小长度（独立使用时）:两段线划（3.4 mm–符号占地 ）","icon":"images/issprom2019-2/506-Small-unpaved-footpath-or-track.svg","standard":"issprom2019"},{"code":"507","name":"不明显小径","name_en":"Less distinct small path","description":"不明显的小径或林业采伐道。 最小长度：两条双短线划（7.9 mm-符号占地31.6 m）","icon":"images/issprom2019-2/507-Less-distinct-small-path.svg","standard":"issprom2019"},{"code":"508","name":"林中带状空隙","name_en":"Narrow ride","description":"林中带状空隙是指在没有明显路径的树林中的带状空隙（ 通常是在人工林中）或线性地表痕迹。如果沿着它有一条路径， 则必须使用“无铺装的小径或小车道（506）”绘制。 最小长度：两段线划（9.75 mm-符号占地39 m）","icon":"images/issprom2019-2/508-Narrow-ride.svg","standard":"issprom2019"},{"code":"509.1","name":"铁路","name_en":"Railway","description":"具有永久轨道的铁路，上面铺有铁轨，机车、马车或货车 可在其上行驶。如果禁止跨越铁路或禁止沿着铁路奔跑，则铁路 上叠加符号“禁区（520）”。 最小长度（独立使用时）：两段线划（4 mm-符号占地 ）","icon":"images/issprom2019-2/509.1-Railway.svg","standard":"issprom2019"},{"code":"509.2","name":"有轨电车轨道","name_en":"Tramway","description":"有轨电车是沿着某些特定街道行驶的公共交通工具。运动 员可以轻松越过轨道。除非有轨电车轨道提供导航作用，否则不 予绘制","icon":"images/issprom2019-2/509.2-Tramway.svg","standard":"issprom2019"},{"code":"512.1","name":"桥梁或隧道入口","name_en":"Bridge or tunnel entrance","description":"桥梁是跨越并允许在河流、峡谷、道路等地物上通行的结 构。该符号代表的桥梁可以从下方通过。三角形顶点到其他黑色 符号的制图间距为0.15mm。必须特别注意三角形顶点的绘制。 在下方不能通过的简易桥梁应使用符号“禁止翻越的墙” （515）绘制。 最小尺寸：实地复杂的情况下使用一个三角形绘制（应尽 量避免此类情况），独立使用的情况下最少绘制两个三角形","icon":"images/issprom2019-2/512.1-Bridge-or-tunnel-entrance.svg","standard":"issprom2019"},{"code":"512.2","name":"地下通道或隧道","name_en":"Underpass or tunnel","description":"地下通道或隧道是在地面或建筑物下方通行的通道，尤 其是供行人或车辆通过的通道。该符号的起止位置制图间距为","icon":"images/issprom2019-2/512.2-Underpass-or-tunnel.svg","standard":"issprom2019"},{"code":"512.3","name":"两层可通行层面","name_en":"Area runnable at lower level","description":"除两层结构符号的上层颜色绘制为禁止通行的符号外[例 如：禁止穿越的水域（301）和禁区（520）符号等]，运动员均 可在两层通行。条纹图案的角度与所绘制区域的轴线方向夹角约 45°。 可能的符号组合有：空旷的沙地（213）[使用凌乱空旷地 (403)替代条纹区域]，裸岩地（214），禁止穿越的水域（301） ，浅水域（302），空旷地（401），稀树空旷地（402）[使用 空旷地(401)代替条纹区域]，凌乱空旷地（403），凌乱稀树空 旷地（404）[使用凌乱空旷地(403)代替条纹区域]，慢跑植被 （406），慢行植被(408)，难行植被(410),禁行植被（411）， 耕地（412）[使用凌乱空旷地(403)替代条纹区域]，果园(413) 和葡萄园或类似区域（414）[使用空旷地(401)或凌乱空旷地 (403)替代条纹区域]，铺装地面（501），稀树铺装地面(501.3) [使用铺装地面(501)替代条纹区域]，禁区（520），可通行的建 筑物（522），禁区（709）[使用上层100%紫色替代条纹区域]， 临时建筑或隔离区域(714)[使用上层100%紫色替代条纹区域]","icon":"images/issprom2019-2/512.3-Area-runnable-at-lower-level.svg","standard":"issprom2019"},{"code":"513.1","name":"可翻越的墙","name_en":"Passable wall","description":"可翻越的墙是指由石头、砖、混凝土等搭建的墙体。如果 墙高于1.5 m，则必须使用“禁止翻越的墙（515）”绘制。墙体 较宽时必须用可翻越的墙符号绘制轮廓，并填充相应的地面符 号。尽可能绘制带点的线。（其最小长度为圆点距离两侧端点 。） 最小长度（独立使用时）:1.4 mm（符号占地5.6 m）","icon":"images/issprom2019-2/513.1-Passable-wall.svg","standard":"issprom2019"},{"code":"513.2","name":"可翻越的挡土墙","name_en":"Passable retaining wall","description":"仅从一侧可见的可翻越的挡土墙。半点必须指向较低侧。 高度为0.6 m-1.5 m。更低则使用“铺装地面边线或台阶线 （501.1）”绘制。 最小长度（独立使用时）：2.4 mm（符号占地9.6 m）","icon":"images/issprom2019-2/513.2-Passable-retaining-wall.svg","standard":"issprom2019"},{"code":"515","name":"禁止翻越的墙","name_en":"Uncrossable wall","description":"禁止翻越或禁止穿越的墙或挡土墙，其具有隔离或阻挡的 作用。因其高度可能对运动员构成危险所以禁止翻越。非常宽的 禁止翻越的墙必须使用“建筑物（521）”绘制出其形状。 最小长度：1 mm(符号占地4m)","icon":"images/issprom2019-2/515-Uncrossable-wall.svg","standard":"issprom2019"},{"code":"516","name":"可翻越的围栏或栏杆","name_en":"Passable fence or railing","description":"可通过的围栏是靠近或围绕田、院子等地方的障碍物，通 常由柱子、金属丝或木头制成。它用于防止进入、进行控制或标 记边界。栏杆是指由一个或多个横杆组成的障碍物，这些横杆由 间隔较大的直立杆支撑，通常可以钻过。 如果围栏或栏杆有危险或很难翻越，则必须使用“禁止翻 越的围栏或栏杆（518）”绘制。 最小长度（独立使用时）：2.2 mm（符号占地8.8 m）","icon":"images/issprom2019-2/516-Passable-fence-or-railing.svg","standard":"issprom2019"},{"code":"518","name":"禁止翻越的围栏或栏杆","name_en":"Uncrossable fence or railing","description":"因私人财产，或因对运动员有危险或者太高，故禁止穿越 禁止翻越的围栏或栏杆。如果最小长度小于3 mm，则必须用符 号“禁止翻越的墙（515）”绘制。 最小长度（独立使用时）：3 mm（符号占地12 m）","icon":"images/issprom2019-2/518-Uncrossable-fence-or-railing.svg","standard":"issprom2019"},{"code":"519","name":"通过点（可选用）","name_en":"Crossing point","description":"通过点是指围栏、栏杆或墙上很容易被运动员通过的缝 隙、小洞或开口。不应在地图上显示运动员很难通过的小缝隙或 小洞，这些小缝隙或小洞必须在比赛期间予以封闭","icon":"images/issprom2019-2/519-Crossing-point.svg","standard":"issprom2019"},{"code":"520","name":"禁区","name_en":"Area that shall not be entered","description":"禁止进入的区域，例如私人区域、花坛，铁路区域等。除 特别突出的特征（如铁路、大型建筑物或非常大的树木）外，此 区域内禁止绘制任何其他特征物。道路入口应清晰绘出。 完全包含在建筑物内的禁区必须绘制为建筑物的一部分。 应始终用边界线（线粗至少为0.1 mm）绘制该区域的边界。 最小宽度：0.25 mm（符号占地1 m）。 最小面积：0.25 mm²（符号占地4 m²）","icon":"images/issprom2019-2/520-Area-that-shall-not-be-entered.svg","standard":"issprom2019"},{"code":"521","name":"建筑物","name_en":"Building","description":"建筑物是具有屋顶的相对永久性的结构。在“禁区（520 ）”符号内的建筑物可以仅以简化的方式绘制。完全包含在建筑 物内部的禁区必须绘制为建筑物的一部分。 建筑物与其他禁止穿越的障碍物之间最小间距必须为 。建筑物接触在一起的位置禁止绘制边线。 最小宽度：0.5 mm。 最小面积：0.25 mm²（符号占地4 m²）","icon":"images/issprom2019-2/521-Building.svg","standard":"issprom2019"},{"code":"522","name":"可通行的建筑物","name_en":"Canopy","description":"可通行建筑物是一种带有屋顶的结构，通常由支柱、撑杆 或墙壁支撑，例如走廊、通道、有顶棚的球场、公共汽车站、加 油站或车库。建筑物中难通行的狭小可通行部分禁止绘制在地图 上，并在比赛期间封闭。 最小宽度：0.5 mm。 最小面积：0.25 mm²（符号占地4 m²）","icon":"images/issprom2019-2/522-Canopy.svg","standard":"issprom2019"},{"code":"522.1","name":"支柱","name_en":"Pillar","description":"支柱是由石头、砖或其他材料建成的直立的柱的结构，其 高度相对于截面形状而言是细长的，用作支撑建筑物。实地小于 ×1 m的支柱一般不绘制","icon":"images/issprom2019-2/522.1-Pillar.svg","standard":"issprom2019"},{"code":"524","name":"高塔","name_en":"High tower","descripti function getCategory(code, standard) {
  var num = parseInt(code);
  
  // ISCD 使用不同的分类逻辑
  if (standard === 'iscd2018') {
    if (num === 0) return 0;
    if (num >= 1 && num < 2) return 1;
    if (num >= 2 && num < 3) return 2;
    if (num >= 3 && num < 4) return 3;
    if (num >= 4 && num < 5) return 4;
    if (num >= 5 && num < 6) return 5;
    if (num >= 6 && num < 7) return 6;
    if (num >= 8 && num < 9) return 8;
    if (num >= 10 && num < 11) return 10;
    if (num >= 11 && num < 12) return 11;
    if (num >= 12 && num < 13) return 12;
    if (num >= 13 && num < 14) return 13;
    if (num >= 15 && num < 16) return 15;
    return -1;
  }
  
  // ISOM/ISSprOM 分类
  if (num >= 100 && num < 200) return 1;
  if (num >= 200 && num < 300) return 2;
  if (num >= 300 && num < 400) return 3;
  if (num >= 400 && num < 500) return 4;
  if (num >= 500 && num < 600) return 5;
  if (num >= 600 && num < 700) return 6;
  if (num >= 700) return 7;
  return -1;
}

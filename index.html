// ===== RENDER CARD =====
function renderCard(item) {
  // 兼容新旧字段名
  var id = item.id || item.code;
  var name_zh = item.name_zh || item.name;
  var name_en = item.name_en || '';
  var image = item.image || item.icon;
  var label = STD_LABELS[item.standard] + ' ' + id + ' ' + name_zh;
  var html = '<button type="button" class="card" data-std="' + item.standard + '" data-id="' + id + '" aria-label="查看' + escHtml(label) + '">' +
    '<div class="img-col"><div class="img-wrap"><img src="' + image + '" alt="' + escHtml(id + ' ' + name_zh) + '" loading="lazy"></div></div>' +
    '<div class="text-col">' +
      '<div class="code">' + escHtml(id) + '</div>' +
      '<div class="name">' + escHtml(name_zh) + '</div>';
  // 英文小字注释（三套标准统一）
  if (name_en) {
    html += '<div class="en-sub">' + escHtml(name_en) + '</div>';
  }
  if (item.description) {
    html += '<div class="desc">' + escHtml(item.description).replace(/\n/g, '<br>') + '</div>';
  }
  html += '</div></button>';
  return html;
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== RENDER LIST =====
function renderList(items, groupByStd) {
  if (items.length === 0) {
    $listWrap.innerHTML = '';
    $emptyState.style.display = 'block';
    return;
  }
  $emptyState.style.display = 'none';

  if (!groupByStd) {
    // 按分类分组
    var categories = {};
    var currentStd = items.length > 0 ? items[0].standard : 'isom2017';
    var catMap = currentStd === 'iscd2018' ? ISCD_CATEGORY_MAP : CATEGORY_MAP;
    
    for (var i = 0; i < items.length; i++) {
      var cat = getCategory(items[i].code, items[i].standard);
      if (!categories[cat]) categories[cat] = [];
      categories[cat].push(items[i]);
    }
    var html = '';
    var catKeys = Object.keys(categories).sort(function(a, b) { return a - b; });
    for (var j = 0; j < catKeys.length; j++) {
      var catId = catKeys[j];
      var catName = catMap[catId] || '其他';
      var catItems = categories[catId];
      html += '<div class="group-header" data-cat="' + catId + '">';
      html += '<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>';
      html += '<span>' + catName + ' · ' + catItems.length + ' 项</span>';
      html += '</div>';
      html += '<div class="group-items" data-cat="' + catId + '">';
      html += catItems.map(renderCard).join('');
      html += '</div>';
    }
    $listWrap.innerHTML = html;
  } else {
    // Group by standard
    var groups = {};
    for (var i = 0; i < items.length; i++) {
      if (!groups[items[i].standard]) groups[items[i].standard] = [];
      groups[items[i].standard].push(items[i]);
    }
    var html = '';
    var stdKeys = Object.keys(groups);
    for (var j = 0; j < stdKeys.length; j++) {
      var std = stdKeys[j];
      var stdItems = groups[std];
      html += '<div class="group-header">' + STD_LABELS[std] + ' · ' + stdItems.length + ' 个结果</div>';
      html += stdItems.map(renderCard).join('');
    }
    $listWrap.innerHTML = html;
  }

  // Attach click handlers for cards
  $listWrap.querySelectorAll('.card').forEach(function(card) {
    card.addEventListener('click', function() {
      var std = card.dataset.std;
      var code = card.dataset.id;
      openDetail(std, code);
    });
  });

  // Attach click handlers for group headers (collapse/expand)
  $listWrap.querySelectorAll('.group-header[data-cat]').forEach(function(header) {
    header.addEventListener('click', function() {
      var catId = header.dataset.cat;
      var items = $listWrap.querySelector('.group-items[data-cat="' + catId + '"]');
      if (items) {
        header.classList.toggle('collapsed');
        items.classList.toggle('collapsed');
      }
    });
  });
}

// ===== SHOW STANDARD =====
function showStandard(std, skipHash) {
  currentStandard = std;
  if (std === 'all') {
    renderList(ALL_DATA, true);
  } else {
    renderList(DATA_BY_STD[std], false);
  }
  // Update tab active state
  $tabBar.querySelectorAll('.tab').forEach(function(t) {
    t.classList.toggle('active', t.dataset.std === std);
  });
  // Clear search
  if ($searchInput.value) {
    $searchInput.value = '';
  }
  // Show list page
  showListPage();
  // Push hash for tab routing (skip on initial load / route handling / search clear)
  if (!skipHash) {
    if (std === 'all') {
      // Push a clean URL so back from "全部" goes to previous site
      history.pushState('', document.title, window.location.pathname + window.location.search);
    } else {
      window.location.hash = 'tab/' + std;
    }
  }
}

// ===== SEARCH =====
function searchAll(query) {
  var q = query.toLowerCase().trim();
  if (!q) {
    showStandard(currentStandard, true);
    return;
  }
  // Switch to "all" tab visual
  $tabBar.querySelectorAll('.tab').forEach(function(t) {
    t.classList.toggle('active', t.dataset.std === 'all');
  });
  currentStandard = 'all';

  var results = { isom2017: [], issprom2019: [], iscd2018: [] };
  for (var i = 0; i < ALL_DATA.length; i++) {
    var item = ALL_DATA[i];
    // Only search code/id and name, case-insensitive
    var sid = item.id || item.code;
    var sname = item.name_zh || item.name;
    var haystack = (sid + ' ' + sname).toLowerCase();
    if (haystack.includes(q)) {
      results[item.standard].push(item);
    }
  }
  var allResults = results.isom2017.concat(results.issprom2019).concat(results.iscd2018);
  renderList(allResults, true);
  showListPage();
}

// ===== SHOW LIST PAGE =====
function showListPage() {
  $listPage.style.display = 'block';
  $detailPage.classList.remove('show');
}

// ===== OPEN DETAIL =====
function openDetail(std, code) {
  var list = DATA_BY_STD[std];
  currentDetailIndex = -1;
  for (var i = 0; i < list.length; i++) {
    var cid = list[i].id || list[i].code;
    if (cid === code) {
      currentDetailList = list;
      currentDetailIndex = i;
      break;
    }
  }
  // If not found in the specific standard, search all
  if (currentDetailIndex === -1) {
    currentDetailList = ALL_DATA;
    for (var i = 0; i < ALL_DATA.length; i++) {
      var aid = ALL_DATA[i].id || ALL_DATA[i].code;
      if (aid === code && ALL_DATA[i].standard === std) {
        currentDetailIndex = i;
        break;
      }
    }
  }
  renderDetail();
  $listPage.style.display = 'none';
  $detailPage.classList.add('show');
  window.location.hash = 'detail/' + std + '/' + encodeURIComponent(code);
  window.scrollTo(0, 0);
}

function renderDetail() {
  var item = currentDetailList[currentDetailIndex];
  if (!item) return;

  // 兼容新旧字段名
  var id = item.id || item.code;
  var name_zh = item.name_zh || item.name;
  var name_en = item.name_en || '';
  var image = item.image || item.icon;

  $detailImg.src = image;
  $detailImg.alt = id + ' ' + name_zh;
  $detailCode.textContent = id;
  $detailName.textContent = name_zh;

  // 英文名放在中文名称下方小字（三套标准统一）
  var oldEnSub = document.getElementById('detailEnSub');
  if (oldEnSub) oldEnSub.remove();
  if (name_en) {
    $detailName.insertAdjacentHTML('afterend', '<div class="en-sub" id="detailEnSub" style="font-size:.85rem;color:#6b7a72;margin-top:2px;margin-bottom:12px;text-align:center">' + escHtml(name_en) + '</div>');
  }

  // Parse description into paragraphs
  var desc = item.description || '';
  var paragraphs;
  // If description contains \n, split by newlines; each line = one paragraph
  if (desc.indexOf('\n') !== -1) {
    paragraphs = desc.split(/\n/).filter(function(p) { return p.trim(); });
  } else {
    // No newlines: split by Chinese sentence breaks, group 2-3 per paragraph
    var rawParts = desc.split(/(?<=[。！？])/);
    var parts = [];
    for (var i = 0; i < rawParts.length; i++) {
      var p = rawParts[i].trim();
      if (!p) continue;
      parts.push(p);
    }
    paragraphs = [];
    var buf = '';
    var count = 0;
    for (var i = 0; i < parts.length; i++) {
      if (buf) buf += '';
      buf += parts[i];
      count++;
      if (count >= 3 || i === parts.length - 1) {
        paragraphs.push(buf);
        buf = '';
        count = 0;
      }
    }
    if (buf.trim()) paragraphs.push(buf);
  }

  $descCard.innerHTML = paragraphs.map(function(p) {
    return '<p>' + escHtml(p) + '</p>';
  }).join('');

  // Update navigation
  var total = currentDetailList.length;
  var pos = currentDetailIndex + 1;
  $navCount.textContent = pos + ' / ' + total;

  // Previous
  if (currentDetailIndex > 0) {
    var prev = currentDetailList[currentDetailIndex - 1];
    var pid = prev.id || prev.code;
    var pname = prev.name_zh || prev.name;
    $prevLabel.textContent = pid + ' ' + pname;
    document.getElementById('bottomPrev').style.visibility = 'visible';
    document.getElementById('prevBtn').style.visibility = 'visible';
  } else {
    $prevLabel.textContent = '—';
    document.getElementById('bottomPrev').style.visibility = 'hidden';
    document.getElementById('prevBtn').style.visibility = 'hidden';
  }

  // Next
  if (currentDetailIndex < total - 1) {
    var next = currentDetailList[currentDetailIndex + 1];
    var nid = next.id || next.code;
    var nname = next.name_zh || next.name;
    $nextLabel.textContent = nid + ' ' + nname;
    document.getElementById('bottomNext').style.visibility = 'visible';
    document.getElementById('nextBtn').style.visibility = 'visible';
  } else {
    $nextLabel.textContent = '—';
    document.getElementById('bottomNext').style.visibility = 'hidden';
    document.getElementById('nextBtn').style.visibility = 'hidden';
  }
}

function navigateDetail(direction) {
  var newIndex = currentDetailIndex + direction;
  if (newIndex < 0) {
    newIndex = currentDetailList.length - 1;
  } else if (newIndex >= currentDetailList.length) {
    newIndex = 0;
  }
  currentDetailIndex = newIndex;
  var item = currentDetailList[currentDetailIndex];
  var nid = item.id || item.code;
  // Use replaceState to avoid cluttering browser history on prev/next navigation
  history.replaceState('', document.title, window.location.pathname + window.location.search + '#detail/' + item.standard + '/' + encodeURIComponent(nid));
  renderDetail();
  window.scrollTo(0, 0);
}

// ===== EVENT LISTENERS =====
// Search input
$searchInput.addEventListener('input', function() {
  searchAll(this.value);
});

// Tab clicks
$tabBar.addEventListener('click', function(e) {
  var tab = e.target.closest('.tab');
  if (!tab) return;
  var std = tab.dataset.std;
  if ($searchInput.value) {
    $searchInput.value = '';
  }
  showStandard(std);
});

// Back button — browser history handles the three-level navigation:
// detail → tab list → all → exit (each step pops one history entry)
document.getElementById('backBtn').addEventListener('click', function() {
  history.back();
});

// Nav arrows in header
document.getElementById('prevBtn').addEventListener('click', function() { navigateDetail(-1); });
document.getElementById('nextBtn').addEventListener('click', function() { navigateDetail(1); });

// Bottom nav buttons
document.getElementById('bottomPrev').addEventListener('click', function() { navigateDetail(-1); });
document.getElementById('bottomNext').addEventListener('click', function() { navigateDetail(1); });

// Keyboard navigation
document.addEventListener('keydown', function(e) {
  if ($detailPage.classList.contains('show')) {
    if (e.key === 'ArrowLeft') { e.preventDefault(); navigateDetail(-1); }
    if (e.key === 'ArrowRight') { e.preventDefault(); navigateDetail(1); }
    if (e.key === 'Escape') {
      if ($imgOverlay.classList.contains('show')) {
        closeOverlay();
      } else {
        e.preventDefault();
        history.back();
      }
    }
  }
  // Ctrl+K / Cmd+K to focus search
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    showStandard('all');
    $searchInput.focus();
    $searchInput.select();
  }
});

// ===== HANDLE BACK/FORWARD BUTTON =====
function handleRoute() {
  // Close fullscreen overlay if open
  if ($imgOverlay && $imgOverlay.classList.contains('show')) closeOverlay();
  var hash = window.location.hash;
  if (!hash || hash === '#') {
    showStandard('all', true);
    return;
  }
  // Tab route: #tab/<std>
  var tabMatch = hash.match(/^#tab\/([a-z0-9]+)$/i);
  if (tabMatch) {
    showStandard(tabMatch[1], true);
    return;
  }
  // Detail route: #detail/<std>/<code>
  var m = hash.match(/^#detail\/([a-z0-9]+)\/(.+)$/i);
  if (m) {
    var std = m[1];
    var code = decodeURIComponent(m[2]);
    var list = DATA_BY_STD[std] || ALL_DATA;
    for (var i = 0; i < list.length; i++) {
      var lid = list[i].id || list[i].code;
      if (lid === code) {
        currentDetailList = list;
        currentDetailIndex = i;
        renderDetail();
        $listPage.style.display = 'none';
        $detailPage.classList.add('show');
        window.scrollTo(0, 0);
        return;
      }
    }
  }
  showStandard('all', true);
}

// ===== INITIAL RENDER =====
showStandard('all', true);
handleRoute();

window.addEventListener('hashchange', handleRoute);

// ===== TOAST =====
var toastTimer;
function showToast(msg) {
  $toast.textContent = msg;
  $toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() {
    $toast.classList.remove('show');
  }, 2000);
}

// ===== SEARCH CLEAR BUTTON =====
var $searchClear = document.getElementById('searchClear');
$searchInput.addEventListener('input', function() {
  if (this.value) {
    $searchClear.classList.add('show');
  } else {
    $searchClear.classList.remove('show');
  }
});
$searchClear.addEventListener('click', function() {
  $searchInput.value = '';
  $searchClear.classList.remove('show');
  showStandard(currentStandard, true);
  $searchInput.focus();
});

// ===== IMAGE FULLSCREEN VIEWER =====
var $imgOverlay = document.getElementById('imgOverlay');
var $overlayImg = document.getElementById('overlayImg');

document.querySelector('.detail-img-wrap').addEventListener('click', function() {
  $overlayImg.src = $detailImg.src;
  $overlayImg.alt = $detailImg.alt;
  $imgOverlay.classList.add('show');
  document.body.style.overflow = 'hidden';
});

function closeOverlay() {
  $imgOverlay.classList.remove('show');
  document.body.style.overflow = '';
}
$imgOverlay.addEventListener('click', function(e) {
  if (e.target === $imgOverlay || e.target === $overlayImg) closeOverlay();
});
document.getElementById('overlayClose').addEventListener('click', closeOverlay);

// ===== SWIPE NAVIGATION (Touch) =====
(function() {
  var startX = 0, startY = 0, movedX = 0;
  var swiping = false;
  var $content = document.querySelector('.detail-content');

  function resetSwipe() {
    swiping = false;
    movedX = 0;
    $content.style.transform = '';
    $content.classList.remove('swiping');
  }

  document.addEventListener('touchstart', function(e) {
    if (!$detailPage.classList.contains('show')) return;
    if ($imgOverlay.classList.contains('show')) return;
    if (e.touches.length !== 1) { resetSwipe(); return; }
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    movedX = 0;
    swiping = false;
  }, { passive: true });

  document.addEventListener('touchmove', function(e) {
    if (!$detailPage.classList.contains('show')) return;
    if ($imgOverlay.classList.contains('show')) return;
    if (e.touches.length !== 1) return;
    var dx = e.touches[0].clientX - startX;
    var dy = e.touches[0].clientY - startY;

    if (!swiping && Math.abs(dx) > 10 && Math.abs(dx) > Math.abs(dy)) {
      swiping = true;
      $content.classList.add('swiping');
    }

    if (swiping) {
      movedX = dx;
      if (currentDetailIndex === 0 && dx > 0) movedX = dx * 0.35;
      if (currentDetailIndex >= currentDetailList.length - 1 && dx < 0) movedX = dx * 0.35;
      $content.style.transform = 'translateX(' + movedX + 'px)';
      e.preventDefault();
    }
  }, { passive: false });

  document.addEventListener('touchend', function(e) {
    if (!swiping) return;
    var absX = Math.abs(movedX);

    if (absX > 80) {
      if (movedX > 0) {
        if (currentDetailIndex > 0) {
          navigateDetail(-1);
        } else {
          history.back();
          resetSwipe();
          return;
        }
      } else {
        if (currentDetailIndex < currentDetailList.length - 1) {
          navigateDetail(1);
        }
      }
    }
    resetSwipe();
  });
})();

// ===== SCROLL TO TOP BUTTON =====
var $scrollTopBtn = document.getElementById('scrollTopBtn');
var scrollTicking = false;
window.addEventListener('scroll', function() {
  if (!scrollTicking) {
    requestAnimationFrame(function() {
      var listVisible = $listPage.style.display !== 'none';
      if (listVisible && window.scrollY > 400) {
        $scrollTopBtn.classList.add('show');
      } else {
        $scrollTopBtn.classList.remove('show');
      }
      scrollTicking = false;
    });
    scrollTicking = true;
  }
}, { passive: true });

$scrollTopBtn.addEventListener('click', function() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
});
